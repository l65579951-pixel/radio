<script>
    let audioContext = null;
    let noiseNode = null;
    let filterNode = null;
    let localAudio = new Audio();
    let isPlaying = false;
    let currentMode = 'analog'; 
    let isAnalogBypassActive = true;

    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnRew = document.getElementById('btn-rew');
    const btnFF = document.getElementById('btn-ff');
    const btnEject = document.getElementById('btn-eject');
    const radioBtn = document.getElementById('radio-mode-btn');
    const radioOffBtn = document.getElementById('radio-off-btn');
    const trackDisplay = document.getElementById('track-display');
    const statusLed = document.getElementById('status-led');
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    
    const settingsBtn = document.getElementById('settings-btn');
    const closeDrawerBtn = document.getElementById('close-drawer-btn');
    const configDrawer = document.getElementById('config-drawer');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const volumeControl = document.getElementById('volume-control');
    const spotifyLink = document.getElementById('spotify-link');
    const spotifyIframe = document.getElementById('spotify-iframe');

    const reelLeft = document.getElementById('reel-left');
    const reelRight = document.getElementById('reel-right');
    const casetePhysical = document.getElementById('casete-physical');

    radioBtn.classList.add('active');
    statusLed.classList.add('active');

    // --- NUEVA LÓGICA DE DETECCIÓN Y PEGADO ---
    document.addEventListener('paste', (e) => {
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        if (paste && paste.includes('spotify.com')) {
            spotifyLink.value = paste;
            procesarEnlaceSpotify(paste);
            localStorage.setItem('last_spotify_playlist', paste);
        }
    });

    function obtenerIcono(url) {
        if (url.includes('playlist')) return '🎵 ';
        if (url.includes('track')) return '🎧 ';
        if (url.includes('episode') || url.includes('show')) return '🎙️ ';
        return '🔗 ';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedPlaylist = localStorage.getItem('last_spotify_playlist');
        if (savedPlaylist) {
            spotifyLink.value = savedPlaylist;
            procesarEnlaceSpotify(savedPlaylist);
        }
        const savedTheme = localStorage.getItem('app-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    });

    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app-theme', newTheme);
    });

    settingsBtn.addEventListener('click', () => configDrawer.classList.add('visible'));
    closeDrawerBtn.addEventListener('click', () => configDrawer.classList.remove('visible'));

    function procesarEnlaceSpotify(url) {
        if (url) {
            let embedUrl = url;
            if (url.includes('spotify.com') && !url.includes('/embed')) {
                embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
            }
            spotifyIframe.src = embedUrl;
            currentMode = 'spotify';
            trackDisplay.textContent = obtenerIcono(url) + "SPOTIFY CONFIGURADO";
            
            casetePhysical.classList.remove('inserted');
            setTimeout(() => casetePhysical.classList.add('inserted'), 100);
        }
    }

    spotifyLink.addEventListener('input', (e) => {
        const url = e.target.value.trim();
        if (url) {
            localStorage.setItem('last_spotify_playlist', url);
            procesarEnlaceSpotify(url);
        } else {
            localStorage.removeItem('last_spotify_playlist');
            spotifyIframe.src = '';
            currentMode = 'analog';
        }
    });

    let monitorInterval = setInterval(() => {
        if (document.activeElement === spotifyIframe) {
            if (!isPlaying && currentMode === 'spotify') playVisualsOnly();
            window.focus();
        }
    }, 500);

    function playVisualsOnly() {
        isPlaying = true;
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
        statusLed.classList.add('active');
        reelLeft.className = 'reel-overlay spinning';
        reelRight.className = 'reel-overlay spinning';
        trackDisplay.textContent = "REPRODUCIENDO SPOTIFY";
    }

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = "var(--border-color)"; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.background = "var(--visor-bg)"; });
    dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.style.background = "var(--visor-bg)"; if (e.dataTransfer.files.length > 0) cargarAudioLocal(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) cargarAudioLocal(e.target.files[0]); });

    function cargarAudioLocal(file) {
        localAudio.src = URL.createObjectURL(file);
        trackDisplay.textContent = file.name.toUpperCase();
        currentMode = 'local';
        stopAnalogNoise();
        casetePhysical.classList.remove('inserted');
        setTimeout(() => { casetePhysical.classList.add('inserted'); playAudio(); }, 100);
    }

    function initAudioContext() { if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)(); }

    function startAnalogNoise() {
        if (!isAnalogBypassActive) return;
        initAudioContext();
        if (audioContext.state === 'suspended') audioContext.resume();
        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = (Math.random() * 2 - 1) * 0.012;
        noiseNode = audioContext.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        noiseNode.loop = true;
        filterNode = audioContext.createBiquadFilter();
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 1000;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = volumeControl.value;
        noiseNode.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioContext.destination);
        noiseNode.start(0);
    }

    function stopAnalogNoise() { if (noiseNode) { try { noiseNode.stop(); } catch(e) {} noiseNode = null; } }

    function playAudio() {
        isPlaying = true;
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
        statusLed.classList.add('active');
        reelLeft.className = 'reel-overlay spinning';
        reelRight.className = 'reel-overlay spinning';
        if (currentMode === 'local') localAudio.play();
        else if (currentMode === 'analog') { startAnalogNoise(); trackDisplay.textContent = "SINTETIZADOR ACTIVO"; }
        else if (currentMode === 'spotify') { trackDisplay.textContent = "SPOTIFY ACTIVO"; const currentSrc = spotifyIframe.src; spotifyIframe.src = currentSrc; }
    }

    function pauseAudio() {
        isPlaying = false;
        btnPlay.classList.remove('active');
        btnPause.classList.add('active');
        statusLed.classList.remove('active');
        reelLeft.className = 'reel-overlay';
        reelRight.className = 'reel-overlay';
        if (currentMode === 'local') localAudio.pause();
        else stopAnalogNoise();
    }

    btnPlay.addEventListener('click', playAudio);
    btnPause.addEventListener('click', pauseAudio);

    btnFF.addEventListener('click', () => {
        if (currentMode === 'local') localAudio.currentTime += 5;
        else if (currentMode === 'spotify') spotifyIframe.src = spotifyIframe.src.split('#')[0] + '#' + Math.random();
        reelLeft.className = 'reel-overlay spinning-fast';
        reelRight.className = 'reel-overlay spinning-fast';
        setTimeout(() => { if (isPlaying) { reelLeft.className = 'reel-overlay spinning'; reelRight.className = 'reel-overlay spinning'; } else { reelLeft.className = 'reel-overlay'; reelRight.className = 'reel-overlay'; } }, 600);
    });

    btnRew.addEventListener('click', () => {
        if (currentMode === 'local') localAudio.currentTime -= 5;
        else if (currentMode === 'spotify') spotifyIframe.src = spotifyIframe.src.split('#')[0] + '#' + Math.random();
        reelLeft.className = 'reel-overlay spinning-reverse';
        reelRight.className = 'reel-overlay spinning-reverse';
        setTimeout(() => { if (isPlaying) { reelLeft.className = 'reel-overlay spinning'; reelRight.className = 'reel-overlay spinning'; } else { reelLeft.className = 'reel-overlay'; reelRight.className = 'reel-overlay'; } }, 600);
    });

    btnEject.addEventListener('click', () => { pauseAudio(); stopAnalogNoise(); localAudio.src = ''; trackDisplay.textContent = "CASSETE EXPULSADO"; casetePhysical.classList.remove('inserted'); });

    radioBtn.addEventListener('click', () => { isAnalogBypassActive = true; radioBtn.classList.add('active'); radioOffBtn.classList.remove('active'); statusLed.classList.add('active'); trackDisplay.textContent = "BYPASS ANALÓGICO ACTIVADO"; if (isPlaying) startAnalogNoise(); });

    radioOffBtn.addEventListener('click', () => { isAnalogBypassActive = false; radioBtn.classList.remove('active'); radioOffBtn.classList.add('active'); statusLed.classList.remove('active'); stopAnalogNoise(); if (currentMode === 'spotify' && spotifyLink.value) trackDisplay.textContent = "SPOTIFY ACTIVO (SIN BYPASS)"; else if (currentMode === 'local' && localAudio.src) { trackDisplay.textContent = "AUDIO LOCAL ACTIVO"; if (isPlaying) { localAudio.play(); statusLed.classList.add('active'); } } else trackDisplay.textContent = "SINTETIZADOR DESACTIVADO"; });

    volumeControl.addEventListener('input', (e) => { localAudio.volume = e.target.value; });
</script>
