    <style>

            --panel-bg: #2d2d2d;
            --panel-border: #404040;
            --text-color: #f0f0f0;
            --accent-color: #ff9f1c;
            --cassette-body: #1e1e1e;
            --cassette-label: #f4ecd8;
            --cassette-label-text: #222;
            --wheel-color: #111;
            --wheel-teeth: #ff9f1c;
        }

        [data-theme="light"] {
            --bg-color: #e6e4dc;
            --panel-bg: #d4cfb9;
            --panel-border: #b8b194;
            --text-color: #2b2b2b;

            --cassette-body: #eae7db;

        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

        }

        body {
            background-color: var(--bg-color);

        }

        .widget-container {

        }

        .header {
            display: flex;

            display: flex;

        }

        .theme-toggle, .radio-mode-btn, .bypass-off-btn {
            background: var(--panel-border);

        .cassette-player {
            width: 100%;

        .cassette-label {
            background: var(--cassette-label);
            color: var(--cassette-label-text);
            border-radius: 6px;

            border: 2px solid #333;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);

        .label-header {

            justify-content: space-between;
            border-bottom: 1px solid #888;

            font-family: 'Courier New', Courier, monospace;

        /* THE HOLE: El espacio donde se monta el Iframe real de Spotify */
        .spotify-window-cutout {

            background: #000;
            border: 3px solid #111;
            border-radius: 6px;
            margin-top: 8px;

        .reel-decoration {
            position: absolute;

            border: 2px dashed var(--wheel-teeth);

            z-index: 1; /* Detrás del iframe si es opaco, visible en los bordes */
            opacity: 0.4;
        }
        .reel-left-dec { left: 40px; }
        .reel-right-dec { right: 40px; }

        @keyframes spin {

    </style>
</head>
<body>

<div class="widget-container">
    <div class="header">
        <span class="title">Retro Cassette</span>
        <div class="controls-top">
            <div class="led-indicator" id="status-led"></div>
            <button class="radio-mode-btn" id="radio-mode-btn">📟 ANALOG MODE</button>
            <button class="bypass-off-btn" id="bypass-off-btn">🛑 STOP BYPASS</button>
            <button class="theme-toggle" id="theme-toggle-btn">🌗 TEMA</button>
        </div>
    </div>

    <!-- CASSETTE -->
    <div class="cassette-player">
        <div class="cassette-label">
            <div class="label-header">
                <span>STEREO CASSETTE</span>
                <span>C-90</span>
            </div>
            
            <!-- EL HUECO TRANSPARENTE: Contiene el Iframe real e interactivo de Spotify -->
            <div class="spotify-window-cutout">
                <!-- Efectos de engranajes por detrás -->
                <div class="reel-decoration reel-left-dec" id="r-left"></div>
                <div class="reel-decoration reel-right-dec" id="r-right"></div>
                
                <!-- Iframe compactado real sin superposiciones molestas -->
                <iframe class="spotify-interactive-iframe" id="spotify-iframe" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <div class="cassette-bottom">
            <div class="cassette-hole"></div>
            <div class="cassette-hole"></div>
            <div class="cassette-hole"></div>
        </div>
    </div>

    <!-- BOTONES AUXILIARES -->
    <div class="button-deck">
        <button class="deck-btn" id="btn-play">▶️<br>PLAY</button>
        <button class="deck-btn" id="btn-pause">⏸️<br>PAUSE</button>
        <button class="deck-btn" id="btn-eject">⏏️<br>EJECT</button>
    </div>

    <!-- CONFIG -->
    <div class="config-section">
        <div class="input-group">
            <label>Pega tu canción o playlist de Spotify:</label>
            <input type="text" class="text-input" id="spotify-link" placeholder="https://open.spotify.com/track/... o playlist" />
        </div>
    </div>
</div>

<script>
    let isPlaying = false;
    const spotifyIframe = document.getElementById('spotify-iframe');
    const spotifyLink = document.getElementById('spotify-link');
    const statusLed = document.getElementById('status-led');
    const themeBtn = document.getElementById('theme-toggle-btn');
    const radioBtn = document.getElementById('radio-mode-btn');
    const bypassOffBtn = document.getElementById('bypass-off-btn');
    const rLeft = document.getElementById('r-left');
    const rRight = document.getElementById('r-right');
    
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnEject = document.getElementById('btn-eject');

    // Cargar enlace guardado
    const savedLink = localStorage.getItem('retro_spotify_link') || 'https://open.spotify.com/embed/playlist/37i9dQZF1DX8XZgIasS662';
    spotifyLink.value = savedLink.replace('/embed', '');
    updateIframe(savedLink);

    spotifyLink.addEventListener('input', (e) => {
        let val = e.target.value;
        if(val) {
            localStorage.setItem('retro_spotify_link', val);
            updateIframe(val);
        }
    });

    function updateIframe(url) {
        let embedUrl = url;
        if (url.includes('spotify.com') && !url.includes('/embed')) {
            embedUrl = url.replace('open.spotify.com/', 'open.spotify.com/embed/');
        }
        spotifyIframe.src = embedUrl;
        statusLed.className = "led-indicator active";
    }

    // El play del casete físico activa la animación de engranajes de fondo
    btnPlay.addEventListener('click', () => {
        isPlaying = true;
        rLeft.classList.add('spinning');
        rRight.classList.add('spinning');
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
        // Nota: Para iniciar la música, debes hacer clic directamente en el botón Play dentro de la ventana de Spotify.
    });

    btnPause.addEventListener('click', () => {
        isPlaying = false;
        rLeft.classList.remove('spinning');
        rRight.classList.remove('spinning');
        btnPlay.classList.remove('active');
        btnPause.classList.add('active');
    });

    btnEject.addEventListener('click', () => {
        isPlaying = false;
        rLeft.classList.remove('spinning');
        rRight.classList.remove('spinning');
        btnPlay.classList.remove('active');
        btnPause.classList.remove('active');
        spotifyIframe.src = '';
        spotifyLink.value = '';
        localStorage.removeItem('retro_spotify_link');
    });

    themeBtn.addEventListener('click', () => {
        const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', theme);
    });
</script>
</body>
</html>
