<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Roja Retro</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .widget-container {
      position: relative;
      width: 450px;
      height: 320px;
    }

    /* EL CASETE ROJO: Clavado perfecto en su ranura, sin flotar en el limbo */
    .casete-rojo {
      position: absolute;
      top: 106px;
      left: 80px;
      width: 140px;
      height: 88px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 1; /* Detrás del marco frontal */
    }

    /* LA FACHADA: La grabadora roja tapa todo */
    .grabadora-roja {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 2;
      pointer-events: none; /* Deja pasar los clics hacia los botones invisibles */
    }

    /* EL ENGAÑO VISUAL: 
       Este contenedor se ubica JUSTO encima del botón físico de "PLAY" de la grabadora.
       Adentro tiene el reproductor de Spotify invisible, alineando su Play nativo con el nuestro. */
    .click-trap-play {
      position: absolute;
      top: 48px;  /* Altura de las teclas físicas */
      left: 108px; /* Posición exacta de la tecla PLAY */
      width: 25px;
      height: 25px;
      overflow: hidden;
      z-index: 10; /* Al frente de todo para recibir el clic */
      border-radius: 50%;
    }

    /* El iframe está oculto a la vista (opacity: 0) pero sigue siendo clickeable */
    .click-trap-play iframe {
      position: absolute;
      top: -27px;  /* Desplazamiento para que el botón de Spotify coincida con el botón rojo */
      left: -16px;
      width: 80px;
      height: 80px;
      opacity: 0.001; /* Completamente invisible, pero detectable para el mouse */
      border: none;
    }

    /* PANTALLA DIGITAL (Para configurar tu música) */
    .pantalla-digital {
      position: absolute;
      top: 108px;
      left: 242px;
      width: 130px;
      height: 38px;
      background: #0b0c0e;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff3333;
      font-size: 9px;
      font-family: monospace;
      letter-spacing: 1px;
      z-index: 5;
    }

    .input-link {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .pantalla-digital:hover .input-link {
      opacity: 1;
      pointer-events: auto;
    }

    .input-link input {
      width: 75%;
      background: #111;
      border: 1px solid #ff3333;
      color: #ff3333;
      font-size: 8px;
      padding: 2px;
    }

    .input-link button {
      background: #ff3333;
      color: #000;
      border: none;
      font-size: 8px;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 4px;
    }
  </style>
</head>
<body>

  <div class="widget-container">
    
    <!-- 1. El casete rojo en su ranura -->
    <div class="casete-rojo"></div>

    <!-- 2. El "Engaño Visual": Botón invisible sobre la tecla PLAY física -->
    <div class="click-trap-play">
      <iframe id="reproductor" src="" allow="encrypted-media"></iframe>
    </div>

    <!-- 3. Frente de la Grabadora -->
    <div class="grabadora-roja"></div>

    <!-- Pantalla para meter tu link de Spotify -->
    <div class="pantalla-digital">
      <div id="textoStatus">NO LINK</div>
      <div class="input-link">
        <input type="text" id="urlPlaylist" placeholder="Pegá link...">
        <button onclick="guardarLink()">OK</button>
      </div>
    </div>

  </div>

  <script>
    const iframe = document.getElementById('reproductor');
    const input = document.getElementById('urlPlaylist');
    const status = document.getElementById('textoStatus');

    // Carga de playlist guardada, NO hay nada por defecto
    window.onload = () => {
      const guardado = localStorage.getItem('miPlaylist');
      if (guardado) {
        input.value = guardado;
        cargarMusica(guardado);
        status.innerText = "TAPE READY";
      } else {
        status.innerText = "INSERT TAPE";
      }
    };

    function cargarMusica(url) {
      if (url.includes("spotify.com")) {
        // Forzamos el embed compacto de Spotify
        iframe.src = url.replace("open.spotify.com/", "open.spotify.com/embed/");
      } else {
        iframe.src = url;
      }
    }

    function guardarLink() {
      const link = input.value.trim();
      if (link) {
        localStorage.setItem('miPlaylist', link);
        cargarMusica(link);
        status.innerText = "TAPE READY";
      }
    }
  </script>
</body>
</html>
