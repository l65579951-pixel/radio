<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Tape Player</title>
    <style>
        :root {
            --bg-color: #121212;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* CONTENEDOR PRINCIPAL - LA GRABADORA ROJA */
        .grabadora-container {
            position: relative;
            width: 600px;
            height: 400px;
            background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* COMPARTIMENTO DEL CASSETTE EN LA FACHADA */
        .compartimento {
            position: absolute;
            width: 254px;
            height: 156px;
            left: 173px;
            top: 72px;
            overflow: hidden;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        /* EL CASSETTE ROJO CON SU ANIMACIÓN ESTILO GIF */
        .casette {
            position: absolute;
            width: 234px;
            height: 146px;
            left: 10px;
            top: -160px; /* Escondido arriba */
            background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: top 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
        }

        /* Animación cuando entra el casete */
        .casette.inserted {
            top: 5px;
            animation: anime-lock 0.8s ease-out forwards;
        }

        @keyframes anime-lock {
            0% { top: -160px; transform: scale(1.05) rotate(-3deg); }
            70% { top: 10px; transform: scale(0.98) rotate(0deg); }
            100% { top: 5px; transform: scale(1) rotate(0deg); }
        }

        /* ENGRANAJES GIRATORIOS SOBRE EL CASSETTE */
        .gear {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px dotted #ffcc00;
            border-radius: 50%;
            background: rgba(0,0,0,0.85);
            top: 62px;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .casette.inserted ~ .gear {
            opacity: 0.9;
        }

        .gear-l { left: 78px; }
        .gear-r { left: 146px; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 2.5s linear infinite;
        }

        /* --- BOTONES INTEGRADOS (ZONAS CLICKABLES INVISIBLES SOBRE LA IMAGEN) --- */
        .btn-hotspot {
            position: absolute;
            height: 42px;
            bottom: 45px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 5;
        }

        /* Alineaciones milimétricas sobre los botones de tu grabadora */
        #rew-spot { width: 45px; left: 165px; }
        #play-spot { width: 45px; left: 215px; }
        #pause-spot { width: 45px; left: 265px; }
        #ff-spot { width: 45px; left: 315px; }
        #eject-spot { width: 45px; left: 365px; }

        /* EL CAMUFLAJE DE SPOTIFY: CAPA INVISIBLE SOBRE EL PLAY FÍSICO */
        .spotify-hack-layer {
            position: absolute;
            width: 45px;
            height: 42px;
            left: 215px; /* Justo encima del botón PLAY */
            bottom: 45px;
            overflow: hidden;
            opacity: 0.001; /* Invisible pero clickable para burlar CORS */
            z-index: 10;
            pointer-events: none; /* Se activa solo con Spotify cargado */
        }

        .spotify-hack-layer.active {
            pointer-events: auto;
        }

        .spotify-hack-layer iframe {
            position: absolute;
            width: 300px;
            height: 80px;
            top: -18px;
            left: -138px; /* Ajusta la posición para que el Play nativo quede bajo el cursor */
            border: none;
        }

        /* --- MENÚ DE ENTRADA OCULTO Y ELEGANTE (Aparece arriba con un hover) --- */
        .hidden-loader {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff3b30;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            transition: transform 0.4s ease;
            z-index: 100;
        }

        body:hover .hidden-loader, .hidden-loader:focus-within {
            transform: translateX(-50%) translateY(0);
        }

        .hidden-loader input {
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            width: 250px;
        }

        .hidden-loader button {
            background: #ff3b30;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Entrada de archivo local camuflada en un área del visor superior */
        .visor-led {
            position: absolute;
            width: 70px;
            height: 20px;
            left: 455px;
            top: 100px;
            cursor: pointer;
            background: rgba(0,255,0,0.1);
            border-radius: 3px;
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <!-- MENÚ INTEGRADO OCULTO (Aparece cuando pasás el mouse arriba de la pantalla) -->
    <div class="hidden-loader">
        <input type="text" id="link-input" placeholder="Pegá tu Playlist de Spotify..." />
        <button id="btn-bypass-toggle">BYPASS: SÍ</button>
    </div>

    <!-- CONTENEDOR GRABADORA -->
    <div class="grabadora-container">
        
        <!-- COMPARTIMENTO CON CASETE -->
        <div class="compartimento">
            <div class="casette" id="tape"></div>
            <div class="gear gear-l" id="gl"></div>
            <div class="gear gear-r" id="gr"></div>
        </div>

        <!-- CAPA HACK DE SPOTIFY (BURLA CORS) -->
        <div class="spotify-hack-layer" id="camo-player">
            <iframe id="sp-iframe" src="" allowtransparency="true" allow="encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>

        <!-- BOTONES INVISIBLES SOBRE LA PROPIA IMAGEN -->
        <button class="btn-hotspot" id="rew-spot"></button>
        <button class="btn-hotspot" id="play-spot"></button>
        <button class="btn-hotspot" id="pause-spot"></button>
        <button class="btn-hotspot" id="ff-spot"></button>
        <button class="btn-hotspot" id="eject-spot"></button>

        <!-- VISOR LED DE CARGA MP3 (Hacé click en la pantalla de la radio para cargar MP3 local) -->
        <div class="visor-led" id="visor-mp3" title="Hacé click para cargar un MP3 local"></div>
        <input type="file" id="file-input" accept="audio/*">
    </div>

<script>
    // Variables de audio
    let audioCtx = null;
    let noiseSource = null;
    let localMp3 = new Audio();
    
    let isPlaying = false;
    let mode = 'analog'; // 'analog', 'spotify', 'local'
    let bypass = true;

    // Elementos DOM
    const tape = document.getElementById('tape');
    const gl = document.getElementById('gl');
    const gr = document.getElementById('gr');
    const linkInput = document.getElementById('link-input');
    const spIframe = document.getElementById('sp-iframe');
    const camoPlayer = document.getElementById('camo-player');
    const bypassBtn = document.getElementById('btn-bypass-toggle');
    const fileInput = document.getElementById('file-input');
    const visorMp3 = document.getElementById('visor-mp3');

    // Botones físicos
    const playBtn = document.getElementById('play-spot');
    const pauseBtn = document.getElementById('pause-spot');
    const ejectBtn = document.getElementById('eject-spot');

    // Guardado y Carga desde LocalStorage
    const savedLink = localStorage.getItem('last_playlist');
    if (savedLink) {
        linkInput.value = savedLink;
        cargarSpotify(savedLink);
    } else {
        // Si no hay link, inicia en bypass con animación
        setBypassMode(true);
    }

    // --- CARGAR SPOTIFY ---
    linkInput.addEventListener('input', (e) => {
        cargarSpotify(e.target.value);
    });

    function cargarSpotify(url) {
        if (!url.includes('spotify.com')) return;
        localStorage.setItem('last_playlist', url);
        
        let embed = url;
        if (!url.includes('/embed')) {
            embed = url.replace('spotify.com/', 'spotify.com/embed/');
        }
        spIframe.src = embed;
        
        setBypassMode(false);
        mode = 'spotify';
        
        // El cassette baja
        tape.classList.add('inserted');
        camoPlayer.classList.add('active');
    }

    // --- MP3 LOCAL ---
    visorMp3.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            const url = URL.createObjectURL(e.target.files[0]);
            localMp3.src = url;
            setBypassMode(false);
            mode = 'local';
            tape.classList.add('inserted');
            ejecutarPlay();
        }
    });

    // --- RUIDO ANALÓGICO ---
    function playNoise() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
            output[i] = (Math.random() * 2 - 1) * 0.015; // Generador ruido cinta retro
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;
        noiseSource.connect(audioCtx.destination);
        noiseSource.start(0);
    }

    function stopNoise() {
        if (noiseSource) {
            try { noiseSource.stop(); } catch(e) {}
            noiseSource = null;
        }
    }

    // --- BYPASS ---
    bypassBtn.addEventListener('click', () => {
        setBypassMode(!bypass);
    });

    function setBypassMode(state) {
        bypass = state;
        if (bypass) {
            bypassBtn.textContent = "BYPASS: SÍ";
            bypassBtn.style.background = "#ff3b30";
            camoPlayer.classList.remove('active');
            mode = 'analog';
            tape.classList.add('inserted');
        } else {
            bypassBtn.textContent = "BYPASS: NO";
            bypassBtn.style.background = "#444";
            stopNoise();
            if (mode === 'analog') {
                mode = 'none';
                tape.classList.remove('inserted');
            }
        }
    }

    // --- ACCIONES FÍSICAS DE LA GRABADORA ---
    function ejecutarPlay() {
        isPlaying = true;
        gl.classList.add('spinning');
        gr.classList.add('spinning');

        if (mode === 'analog') {
            playNoise();
        } else if (mode === 'local') {
            localMp3.play();
        }
    }

    function ejecutarPause() {
        isPlaying = false;
        gl.classList.remove('spinning');
        gr.classList.remove('spinning');

        if (mode === 'analog') {
            stopNoise();
        } else if (mode === 'local') {
            localMp3.pause();
        }
    }

    // Sincronizar el click del camuflaje de Spotify con la animación física de la casetera
    camoPlayer.addEventListener('click', () => {
        if (mode === 'spotify') {
            if (!isPlaying) {
                ejecutarPlay();
            } else {
                ejecutarPause();
            }
        }
    });

    // Controlar el play y pausa para modos offline (Bypass / Local)
    playBtn.addEventListener('click', () => {
        if (mode !== 'spotify') ejecutarPlay();
    });

    pauseBtn.addEventListener('click', () => {
        if (mode !== 'spotify') ejecutarPause();
    });

    // Acción de EJECT
    ejectBtn.addEventListener('click', () => {
        ejecutarPause();
        tape.classList.remove('inserted');
        camoPlayer.classList.remove('active');
        spIframe.src = "";
        linkInput.value = "";
        localStorage.removeItem('last_playlist');
        mode = 'none';
    });
</script>
</body>
</html>
