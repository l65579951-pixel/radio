<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Cassette Player Widget Pro</title>
    <style>
        /* Variables de Tema Soportando Claro/Oscuro */
        :root {
            --bg-color: #f7f4f0;
            --container-bg: #ffffff;
            --text-color: #3e2723;
            --accent-gold: #d4af37;
            --cream: #f4ebd0;
            --led-on: #ff3b30;
            --led-off: #4a1212;
            --drawer-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f5f0eb;
            --accent-gold: #e2ba6e;
            --cream: #333333;
            --led-on: #ff3b30;
            --led-off: #4a1212;
            --drawer-bg: rgba(25, 20, 21, 0.95);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Contenedor de la Fachada Adaptable */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabecera con Controles del Sistema */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin-bottom: 15px;
            gap: 10px;
        }

        /* Selector de Tema Moderno */
        .theme-toggle {
            background: var(--container-bg);
            border: 1px solid var(--accent-gold);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-toggle:hover {
            background: var(--accent-gold);
            color: #000;
        }

        /* Visor de Estado Retro */
        .visor-texto {
            background-color: #2b1718;
            color: #ffb3ba;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 179, 186, 0.3);
            text-align: center;
            flex-grow: 1;
            text-transform: uppercase;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        /* GRABADORA RETRO (Contenedor Base) */
        .grabadora-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1.34 / 1;
            background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* LED Indicador Físico de Estado */
        .led-indicator {
            position: absolute;
            top: 45.5%;
            left: 14%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--led-off);
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
            transition: background-color 0.2s, box-shadow 0.2s;
            z-index: 5;
        }

        .led-indicator.active {
            background-color: var(--led-on);
            box-shadow: 0 0 8px var(--led-on), 0 0 12px var(--led-on);
        }

        /* COMPARTIMENTO ENMASCARADO PARA EL CASETE */
        .compartment-mask {
            position: absolute;
            top: 47.8%;
            left: 36.5%;
            width: 27%;
            height: 18.2%;
            overflow: hidden;
            z-index: 2;
        }

        /* CASETE RETRO */
        .casete-asset {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
            transform: translateY(115%);
            opacity: 0;
            z-index: 3;
        }

        .casete-asset.inserted {
            transform: translateY(0%);
            opacity: 1;
        }

        /* Bobinas mecánicas sobrepuestas */
        .tape-window-overlay {
            position: absolute;
            top: 36%;
            left: 20%;
            width: 60%;
            height: 30%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            pointer-events: none;
            z-index: 4;
        }

        .reel-overlay {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 3px dashed #ffffff;
            background: rgba(0, 0, 0, 0.6);
            transition: transform 0.1s linear;
        }

        /* Animaciones de Giro Mecánico */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-fast {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .spinning {
            animation: spin 2s linear infinite;
        }
        .spinning-fast {
            animation: spin-fast 0.6s linear infinite;
        }
        .spinning-reverse {
            animation: spin-reverse 0.6s linear infinite;
        }

        /* BOTONES DE CONTROL FÍSICOS */
        .mapeo-botones {
            position: absolute;
            top: 44.2%;
            left: 24.8%;
            width: 50.4%;
            height: 6.5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-fisico {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(226, 186, 110, 0.2);
            color: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .btn-fisico:hover {
            background: rgba(226, 186, 110, 0.3);
            border-color: var(--accent-gold);
        }

        .btn-fisico:active, .btn-fisico.active {
            background: rgba(226, 186, 110, 0.6);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        /* CONTROL DE AJUSTES LATERAL */
        .settings-trigger {
            position: absolute;
            right: 14%;
            top: 44%;
            width: 28px;
            height: 28px;
            background: rgba(20, 20, 20, 0.8);
            border: 1.5px solid var(--accent-gold);
            border-radius: 50%;
            color: var(--accent-gold);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, background 0.3s;
            z-index: 12;
        }

        .settings-trigger:hover {
            transform: rotate(45deg) scale(1.1);
            background: var(--accent-gold);
            color: #000;
        }

        /* CAJÓN DE AJUSTES RETRÁCTIL */
        .config-drawer {
            position: absolute;
            top: 48%;
            right: -270px;
            width: 250px;
            background: var(--drawer-bg);
            border: 1.5px solid rgba(226, 186, 110, 0.4);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 11;
            display: none;
            backdrop-filter: blur(8px);
            transition: background-color 0.3s ease;
        }

        .config-drawer.visible {
            display: block;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        .text-input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            box-sizing: border-box;
        }

        .file-dropzone {
            border: 1.5px dashed var(--accent-gold);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.3);
            color: var(--text-color);
        }

        #file-input { display: none; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vol-slider {
            flex-grow: 1;
            height: 4px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
            border-radius: 2px;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-gold);
            cursor: pointer;
        }

        /* CONTENEDOR DE SPOTIFY OPTIMIZADO (Altura ideal de 152px para mostrar controles completos) */
        .spotify-container {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid #282828;
            height: 152px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <!-- Panel superior -->
    <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle-btn" title="Cambiar Tema">🌓 TEMA</button>
        <div class="visor-texto" id="track-display">SINTETIZADOR ANALÓGICO listo</div>
    </div>

    <!-- ESTRUCTURA DE LA GRABADORA -->
    <div class="grabadora-container">
        <!-- LED de estado analógico -->
        <div class="led-indicator" id="status-led"></div>
        
        <!-- Compartimento del casete -->
        <div class="compartment-mask">
            <div class="casete-asset" id="casete-physical">
                <div class="tape-window-overlay">
                    <div class="reel-overlay" id="reel-left"></div>
                    <div class="reel-overlay" id="reel-right"></div>
                </div>
            </div>
        </div>

        <!-- Botones físicos de control alineados perfectamente sobre el arte -->
        <div class="mapeo-botones">
            <button class="btn-fisico" id="btn-rew" title="Retroceder">⏪</button>
            <button class="btn-fisico" id="btn-ff" title="Avanzar">⏩</button>
            <button class="btn-fisico" id="btn-play" title="Play">▶️</button>
            <button class="btn-fisico" id="btn-pause" title="Pause">⏸️</button>
            <button class="btn-fisico" id="btn-eject" title="Expulsar casete">⏏️</button>
            <button class="btn-fisico" id="radio-mode-btn" title="Activar Bypass">📟</button>
            <button class="btn-fisico" id="radio-off-btn" title="Desactivar Bypass">✖️</button>
        </div>

        <!-- Engranaje de Ajustes -->
        <button class="settings-trigger" id="settings-btn" title="Ajustes">⚙️</button>

        <!-- Cajón de Configuración -->
        <div class="config-drawer" id="config-drawer">
            <div class="input-group">
                <label>Playlist Spotify</label>
                <input type="text" class="text-input" id="spotify-link" placeholder="Pegar enlace..." />
            </div>

            <!-- Iframe de Spotify -->
            <div class="spotify-container">
                <iframe id="spotify-iframe" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
            </div>
            
            <div class="input-group" style="margin-top: 15px;">
                <label>Audio Local (.MP3)</label>
                <div class="file-dropzone" id="dropzone">📁 Cargar archivo</div>
                <input type="file" id="file-input" accept="audio/*">
            </div>

            <div class="input-group">
                <label>Volumen</label>
                <div class="slider-container">
                    <input type="range" class="vol-slider" id="volume-control" min="0" max="1" step="0.05" value="0.5">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let audioContext = null;
    let noiseNode = null;
    let filterNode = null;
    let localAudio = new Audio();
    let isPlaying = false;
    let currentMode = 'analog'; // 'analog' | 'local' | 'spotify'
    let isAnalogBypassActive = true;

    // Elementos del DOM
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnRew = document.getElementById('btn-rew');
    const btnFF = document.getElementById('btn-ff');
    const btnEject = document.getElementById('btn-eject');
    const radioBtn = document.getElementById('radio-mode-btn');
    const radioOffBtn = document.getElementById('radio-off-btn');
    const trackDisplay = document.getElementById('track-display');
    const statusLed = document.getElementById('status-led');
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    
    const settingsBtn = document.getElementById('settings-btn');
    const configDrawer = document.getElementById('config-drawer');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const volumeControl = document.getElementById('volume-control');
    const spotifyLink = document.getElementById('spotify-link');
    const spotifyIframe = document.getElementById('spotify-iframe');

    const reelLeft = document.getElementById('reel-left');
    const reelRight = document.getElementById('reel-right');
    const casetePhysical = document.getElementById('casete-physical');

    // Inicialización por defecto
    radioBtn.classList.add('active');
    statusLed.classList.add('active');

    window.addEventListener('DOMContentLoaded', () => {
        const savedPlaylist = localStorage.getItem('last_spotify_playlist');
        if (savedPlaylist) {
            spotifyLink.value = savedPlaylist;
            procesarEnlaceSpotify(savedPlaylist);
        }

        const savedTheme = localStorage.getItem('app-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    });

    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app-theme', newTheme);
    });

    settingsBtn.addEventListener('click', () => {
        configDrawer.classList.toggle('visible');
    });

    function procesarEnlaceSpotify(url) {
        if (url) {
            let embedUrl = url;
            // Asegurar que el formato utilice la interfaz moderna con botones completos de reproducción
            if (url.includes('spotify.com') && !url.includes('/embed')) {
                embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
            }
            spotifyIframe.src = embedUrl;
            currentMode = 'spotify';
            trackDisplay.textContent = "SPOTIFY CONFIGURADO";
            
            casetePhysical.classList.remove('inserted');
            setTimeout(() => {
                casetePhysical.classList.add('inserted');
            }, 100);
        }
    }

    spotifyLink.addEventListener('input', (e) => {
        const url = e.target.value.trim();
        if (url) {
            localStorage.setItem('last_spotify_playlist', url);
            procesarEnlaceSpotify(url);
        } else {
            localStorage.removeItem('last_spotify_playlist');
            spotifyIframe.src = '';
            currentMode = 'analog';
        }
    });

    // Monitoreo inteligente de interacción con el Iframe de Spotify
    let monitorInterval = setInterval(() => {
        if (document.activeElement === spotifyIframe) {
            if (!isPlaying && currentMode === 'spotify') {
                playVisualsOnly();
            }
            window.focus();
        }
    }, 500);

    function playVisualsOnly() {
        isPlaying = true;
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
        statusLed.classList.add('active');
        reelLeft.className = 'reel-overlay spinning';
        reelRight.className = 'reel-overlay spinning';
        trackDisplay.textContent = "REPRODUCIENDO SPOTIFY";
    }

    // Audio Local
    dropzone.addEventListener('click', () => fileInput.click());
    
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.style.background = "rgba(226, 186, 110, 0.2)";
    });

    dropzone.addEventListener('dragleave', () => {
        dropzone.style.background = "rgba(0,0,0,0.3)";
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.background = "rgba(0,0,0,0.3)";
        if (e.dataTransfer.files.length > 0) {
            cargarAudioLocal(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            cargarAudioLocal(e.target.files[0]);
        }
    });

    function cargarAudioLocal(file) {
        localAudio.src = URL.createObjectURL(file);
        trackDisplay.textContent = file.name.toUpperCase();
        currentMode = 'local';
        stopAnalogNoise();
        
        casetePhysical.classList.remove('inserted');
        setTimeout(() => {
            casetePhysical.classList.add('inserted');
            playAudio();
        }, 100);
    }

    function initAudioContext() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    function startAnalogNoise() {
        if (!isAnalogBypassActive) return;
        initAudioContext();
        if (audioContext.state === 'suspended') audioContext.resume();

        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = (Math.random() * 2 - 1) * 0.015;
        }

        noiseNode = audioContext.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        noiseNode.loop = true;

        filterNode = audioContext.createBiquadFilter();
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 1000;

        const gainNode = audioContext.createGain();
        gainNode.gain.value = volumeControl.value;

        noiseNode.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioContext.destination);
        noiseNode.start(0);
    }

    // Asegura una limpieza perfecta de nodos de audio
    function stopAnalogNoise() {
        if (noiseNode) {
            try { noiseNode.stop(); } catch(e) {}
            noiseNode = null;
        }
    }

    // Acciones de los Botones Físicos de la Grabadora
    function playAudio() {
        isPlaying = true;
        btnPlay.classList.add('active');
        btnPause.classList.remove('active');
        statusLed.classList.add('active');
        
        reelLeft.className = 'reel-overlay spinning';
        reelRight.className = 'reel-overlay spinning';

        if (currentMode === 'local') {
            localAudio.play();
        } else if (currentMode === 'analog') {
            startAnalogNoise();
            trackDisplay.textContent = "SINTETIZADOR ACTIVO";
        } else if (currentMode === 'spotify') {
            trackDisplay.textContent = "SPOTIFY ACTIVO";
            const currentSrc = spotifyIframe.src;
            spotifyIframe.src = currentSrc;
        }
    }

    function pauseAudio() {
        isPlaying = false;
        btnPlay.classList.remove('active');
        btnPause.classList.add('active');
        statusLed.classList.remove('active');
        
        reelLeft.className = 'reel-overlay';
        reelRight.className = 'reel-overlay';

        if (currentMode === 'local') {
            localAudio.pause();
        } else {
            stopAnalogNoise();
        }
    }

    btnPlay.addEventListener('click', playAudio);
    btnPause.addEventListener('click', pauseAudio);

    btnFF.addEventListener('click', () => {
        if (currentMode === 'local') {
            localAudio.currentTime += 5;
        } else if (currentMode === 'spotify') {
            spotifyIframe.src = spotifyIframe.src.split('#')[0] + '#' + Math.random();
        }
        reelLeft.className = 'reel-overlay spinning-fast';
        reelRight.className = 'reel-overlay spinning-fast';
        setTimeout(() => {
            if (isPlaying) {
                reelLeft.className = 'reel-overlay spinning';
                reelRight.className = 'reel-overlay spinning';
            } else {
                reelLeft.className = 'reel-overlay';
                reelRight.className = 'reel-overlay';
            }
        }, 600);
    });

    btnRew.addEventListener('click', () => {
        if (currentMode === 'local') {
            localAudio.currentTime -= 5;
        } else if (currentMode === 'spotify') {
            spotifyIframe.src = spotifyIframe.src.split('#')[0] + '#' + Math.random();
        }
        reelLeft.className = 'reel-overlay spinning-reverse';
        reelRight.className = 'reel-overlay spinning-reverse';
        setTimeout(() => {
            if (isPlaying) {
                reelLeft.className = 'reel-overlay spinning';
                reelRight.className = 'reel-overlay spinning';
            } else {
                reelLeft.className = 'reel-overlay';
                reelRight.className = 'reel-overlay';
            }
        }, 600);
    });

    btnEject.addEventListener('click', () => {
        pauseAudio();
        stopAnalogNoise();
        localAudio.src = '';
        trackDisplay.textContent = "CASSETE EXPULSADO";
        casetePhysical.classList.remove('inserted');
    });

    radioBtn.addEventListener('click', () => {
        isAnalogBypassActive = true;
        radioBtn.classList.add('active');
        radioOffBtn.classList.remove('active');
        statusLed.classList.add('active');
        trackDisplay.textContent = "BYPASS ANALÓGICO ACTIVADO";
        if (isPlaying) startAnalogNoise();
    });

    radioOffBtn.addEventListener('click', () => {
        isAnalogBypassActive = false;
        radioBtn.classList.remove('active');
        radioOffBtn.classList.add('active');
        statusLed.classList.remove('active');
        
        stopAnalogNoise();

        if (currentMode === 'spotify' && spotifyLink.value) {
            trackDisplay.textContent = "SPOTIFY ACTIVO (SIN BYPASS)";
        } else if (currentMode === 'local' && localAudio.src) {
            trackDisplay.textContent = "AUDIO LOCAL ACTIVO";
            if (isPlaying) {
                localAudio.play();
                statusLed.classList.add('active');
            }
        } else {
            trackDisplay.textContent = "SINTETIZADOR DESACTIVADO";
        }
    });

    volumeControl.addEventListener('input', (e) => {
        localAudio.volume = e.target.value;
    });
</script>
</body>
</html>
