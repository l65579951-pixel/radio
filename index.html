<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Tape Deck Player</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --accent-color: #ff3b30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* CONTENEDOR PRINCIPAL BASADO EN TU GRABADORA ROJA */
        .deck-container {
            position: relative;
            width: 600px;
            height: 400px;
            background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 20px;
        }

        /* ÁREA DE LA COMPUERTA DEL CASSETTE (DONDE OCURRE LA MAGIA) */
        .cassette-compartment {
            position: absolute;
            width: 254px;
            height: 156px;
            left: 173px;
            top: 72px;
            overflow: hidden;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.45);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        /* EL CASSETTE ROJO CON SU ESTADO INICIAL (FUERA / EXPULSADO) */
        .cassette-tape {
            position: absolute;
            width: 234px;
            height: 146px;
            left: 10px;
            top: -160px; /* Escondido arriba para deslizarse hacia abajo como en el GIF */
            background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), top 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
        }

        /* Animación estilo inserción anime (Baja, frena, y se encaja con un pequeño rebote) */
        .cassette-tape.inserted {
            top: 5px;
            transform: translateY(0) scale(1);
            animation: tape-lock 0.9s ease-out forwards;
        }

        @keyframes tape-lock {
            0% { top: -160px; transform: scale(1.05) rotate(-3deg); }
            70% { top: 12px; transform: scale(0.98) rotate(0deg); }
            100% { top: 5px; transform: scale(1) rotate(0deg); }
        }

        /* ENGRANAJES FÍSICOS SOBRE LOS AGUJEROS DEL CASSETTE ROJO */
        .gear {
            position: absolute;
            width: 28px;
            height: 28px;
            border: 3px dotted #111;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: 59px;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .cassette-tape.inserted ~ .gear {
            opacity: 0.85; /* Solo aparecen si el casete está insertado */
        }

        .gear-left { left: 77px; }
        .gear-right { left: 147px; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 2.5s linear infinite;
        }

        /* HACK DE SUPERPOSICIÓN DE SPOTIFY SOBRE EL BOTÓN DE PLAY FÍSICO */
        /* Ajustado exactamente sobre el botón de PLAY de la grabadora roja */
        .spotify-camo-trigger {
            position: absolute;
            width: 50px;
            height: 35px;
            left: 200px; /* Cambiar si necesitas afinar la posición horizontal en tu pantalla */
            bottom: 50px; /* Cambiar si necesitas afinar la posición vertical */
            overflow: hidden;
            opacity: 0.001; /* Completamente transparente pero clickable */
            z-index: 10;
            pointer-events: none;
        }

        .spotify-camo-trigger.active-hack {
            pointer-events: auto;
        }

        .spotify-camo-trigger iframe {
            position: absolute;
            width: 300px;
            height: 80px;
            top: -22px;
            right: -18px;
            border: none;
        }

        /* SECCIÓN DE CONTROLES INFERIORES */
        .ui-panel {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .text-input {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .status-display {
            background: #0f0f0f;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent-color);
            text-align: center;
            border: 1px solid #222;
        }

        .btn-system {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-system:hover {
            background: var(--accent-color);
        }
    </style>
</head>
<body>

    <!-- LA GRABADORA ROJA CON LA ANIMACIÓN INTERNA -->
    <div class="deck-container">
        
        <!-- Compartimento transparente donde se desliza la cinta -->
        <div class="cassette-compartment">
            <div class="cassette-tape" id="cassette"></div>
            <!-- Engranajes físicos alineados con los huecos del casete -->
            <div class="gear gear-left" id="gear-l"></div>
            <div class="gear gear-right" id="gear-r"></div>
        </div>

        <!-- Hack invisible de Spotify encima del botón play de la grabadora -->
        <div class="spotify-camo-trigger" id="spotify-clicker">
            <iframe id="spotify-iframe" src="" allowtransparency="true" allow="encrypted-media" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>

    <!-- PANEL DE CONFIGURACIÓN -->
    <div class="ui-panel">
        <div class="input-group">
            <label>Inserte Canción / Playlist de Spotify</label>
            <input type="text" class="text-input" id="spotify-input" placeholder="Pegue el enlace aquí para insertar el casete..." />
        </div>

        <div class="input-group" style="display: flex; gap: 10px; justify-content: space-between; align-items: center;">
            <div class="status-display" id="screen-info">SIN CINTA DETECTADA</div>
            <button class="btn-system" id="btn-eject">EJECT ⏏️</button>
        </div>
    </div>

<script>
    const cassette = document.getElementById('cassette');
    const gearL = document.getElementById('gear-l');
    const gearr = document.getElementById('gear-r');
    const spotifyInput = document.getElementById('spotify-input');
    const spotifyIframe = document.getElementById('spotify-iframe');
    const spotifyClicker = document.getElementById('spotify-clicker');
    const screenInfo = document.getElementById('screen-info');
    const btnEject = document.getElementById('btn-eject');

    let isPlaying = false;

    // Detectar enlace de música para insertar cassette
    spotifyInput.addEventListener('input', (e) => {
        const url = e.target.value;
        if (url.includes('spotify.com')) {
            // Convertir a link de Embed
            let embedUrl = url;
            if (!url.includes('/embed')) {
                embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
            }
            spotifyIframe.src = embedUrl;

            // DISPARAR ANIMACIÓN DE INSERCIÓN (ESTILO GIF)
            setTimeout(() => {
                cassette.classList.add('inserted');
                spotifyClicker.classList.add('active-hack');
                screenInfo.textContent = "CASSETTE CARGADO - PRESIONE PLAY EN LA GRABADORA";
            }, 300); // Pequeño delay de carga
        }
    });

    // Monitorear clicks sobre el botón invisible de Play
    spotifyClicker.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) {
            gearL.classList.add('spinning');
            gearr.classList.add('spinning');
            screenInfo.textContent = "REPRODUCIENDO CINTA... ⏺️";
        } else {
            gearL.classList.remove('spinning');
            gearr.classList.remove('spinning');
            screenInfo.textContent = "CINTA EN PAUSA ⏸️";
        }
    });

    // Acción de Eject (Expulsar el casete hacia arriba)
    btnEject.addEventListener('click', () => {
        cassette.classList.remove('inserted');
        spotifyClicker.classList.remove('active-hack');
        gearL.classList.remove('spinning');
        gearr.classList.remove('spinning');
        spotifyIframe.src = "";
        spotifyInput.value = "";
        isPlaying = false;
        screenInfo.textContent = "SIN CINTA DETECTADA";
    });
</script>
</body>
</html>
