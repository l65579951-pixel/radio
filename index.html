<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Tape Deck Player</title>
    <style>
        :root {
            --bg-color: #e6e4dc;
            --text-color: #2b2b2b;
            --panel-bg: #d4cfb9;
            --border-color: #b8b194;
            --accent-color: #d62828;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #ff3b30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s;
            overflow: hidden;
        }

        /* CONTENEDOR DE LA GRABADORA */
        .grabadora-wrapper {
            position: relative;
            width: 550px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grabadora-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        /* COMPARTIMENTO INTERNO REAL (Ubicado justo sobre la casetera física de tu imagen) */
        .cassette-deck {
            position: absolute;
            width: 106px;
            height: 62px;
            left: 222px;
            top: 254px;
            overflow: hidden;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
        }

        /* EL CASSETE INTERNO QUE SE AJUSTA A LA PERFECCIÓN */
        .cassette-tape {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            top: -70px; /* Escondido arriba para bajar al cargar */
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 3;
        }

        .cassette-tape.inserted {
            top: 0px;
        }

        /* PEQUEÑOS ENGRANAJES DE GIRO EN LOS ORIFICIOS DEL CASSETE */
        .reel-gear {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px dotted #ffaa00;
            border-radius: 50%;
            background: #000;
            top: 25px;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cassette-tape.inserted ~ .reel-gear {
            opacity: 0.9;
        }

        .reel-left { left: 34px; }
        .reel-right { left: 60px; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 3s linear infinite;
        }

        /* BOTÓN FLOTANTE PARA ABRIR/CERRAR LA CONFIGURACIÓN */
        .settings-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 100;
        }

        /* PANEL COLAPSABLE DESLIZABLE */
        .settings-panel {
            position: fixed;
            bottom: -400px; /* Oculto abajo por defecto */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 3px solid var(--border-color);
            border-radius: 16px 16px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 99;
        }

        .settings-panel.open {
            bottom: 0;
        }

        .panel-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .input-box {
            flex-grow: 1;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: var(--text-color);
        }

        .text-input {
            width: 100%;
            background: rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            background: rgba(0,0,0,0.05);
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
        }

        /* BOTONES DEL PANEL */
        .btn-action {
            background: var(--border-color);
            color: var(--text-color);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-action.active {
            background: var(--accent-color);
            color: #fff;
        }

        /* IFRAME INVISIBLE DE SPOTIFY (SÓLO PARA AUDIO) */
        .spotify-hidden-iframe {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- BOTÓN DE AJUSTES -->
    <button class="settings-toggle" id="toggle-panel" title="Configurar Radio">⚙️</button>

    <!-- GRABADORA PRINCIPAL -->
    <div class="grabadora-wrapper">
        <img class="grabadora-img" src="https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png" alt="Grabadora">
        
        <!-- Casetera física mimetizada -->
        <div class="cassette-deck">
            <div class="cassette-tape" id="tape"></div>
            <div class="reel-gear reel-left" id="gear-l"></div>
            <div class="reel-gear reel-right" id="gear-r"></div>
        </div>
    </div>

    <!-- PANEL FLOTANTE DE AJUSTES -->
    <div class="settings-panel" id="panel">
        <div class="panel-row">
            <div class="input-box">
                <label>1. Enlace de Playlist Spotify</label>
                <input type="text" class="text-input" id="spotify-input" placeholder="Pegá el link de tu playlist...">
            </div>
            <button class="btn-action active" id="btn-bypass">BYPASS: SÍ</button>
        </div>

        <div class="panel-row">
            <div class="input-box">
                <label>2. Cargar Música Local</label>
                <div class="dropzone" id="dropzone">📁 Haz clic o arrastra tu MP3 acá</div>
                <input type="file" id="file-input" accept="audio/*" style="display: none;">
            </div>
            <button class="btn-action" id="btn-theme">TEMA 🌗</button>
        </div>

        <div class="panel-row" style="justify-content: flex-end; gap: 10px;">
            <button class="btn-action" id="btn-play">PLAY ▶️</button>
            <button class="btn-action" id="btn-pause">PAUSE ⏸️</button>
            <button class="btn-action" id="btn-eject">EJECT ⏏️</button>
        </div>
    </div>

    <!-- Iframe invisible para procesar Spotify -->
    <iframe class="spotify-hidden-iframe" id="sp-iframe" src="" allow="encrypted-media"></iframe>

<script>
    // Variables de audio
    let audioCtx = null;
    let noiseSource = null;
    let localMp3 = new Audio();
    let isPlaying = false;
    let mode = 'analog'; // 'analog', 'spotify', 'local'
    let bypass = true;

    // Elementos DOM
    const panel = document.getElementById('panel');
    const togglePanel = document.getElementById('toggle-panel');
    const tape = document.getElementById('tape');
    const gearL = document.getElementById('gear-l');
    const gearR = document.getElementById('gear-r');
    
    const spotifyInput = document.getElementById('spotify-input');
    const spIframe = document.getElementById('sp-iframe');
    
    const fileInput = document.getElementById('file-input');
    const dropzone = document.getElementById('dropzone');

    const btnBypass = document.getElementById('btn-bypass');
    const btnTheme = document.getElementById('btn-theme');
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnEject = document.getElementById('btn-eject');

    // --- PANEL DESLIZANTE ---
    togglePanel.addEventListener('click', () => {
        panel.classList.toggle('open');
    });

    // --- MEMORIA DE PLAYLIST ---
    const savedPlaylist = localStorage.getItem('last_saved_playlist');
    if (savedPlaylist) {
        spotifyInput.value = savedPlaylist;
        cargarSpotify(savedPlaylist);
    } else {
        setBypass(true);
    }

    // --- DETECTAR Y CARGAR SPOTIFY ---
    spotifyInput.addEventListener('input', (e) => {
        cargarSpotify(e.target.value);
    });

    function cargarSpotify(url) {
        if (!url.includes('spotify.com')) return;
        localStorage.setItem('last_saved_playlist', url);
        
        let embed = url;
        if (!url.includes('/embed')) {
            embed = url.replace('spotify.com/', 'spotify.com/embed/');
        }
        spIframe.src = embed;
        
        setBypass(false);
        mode = 'spotify';
        tape.classList.add('inserted');
    }

    // --- CAMBIAR TEMA ---
    btnTheme.addEventListener('click', () => {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    });

    // --- MODO BYPASS / RUIDO RETRO ---
    btnBypass.addEventListener('click', () => {
        setBypass(!bypass);
    });

    function setBypass(state) {
        bypass = state;
        if (bypass) {
            btnBypass.classList.add('active');
            btnBypass.textContent = "BYPASS: SÍ";
            mode = 'analog';
            tape.classList.add('inserted');
        } else {
            btnBypass.classList.remove('active');
            btnBypass.textContent = "BYPASS: NO";
            stopNoise();
            if (mode === 'analog') {
                mode = 'none';
                tape.classList.remove('inserted');
            }
        }
    }

    // --- ARCHIVOS LOCALES MP3 ---
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            const fileUrl = URL.createObjectURL(e.target.files[0]);
            localMp3.src = fileUrl;
            setBypass(false);
            mode = 'local';
            tape.classList.add('inserted');
            ejecutarPlay();
        }
    });

    // --- GENERADOR DE RUIDO DE CINTA ANALÓGICO ---
    function playNoise() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        
        for (let i = 0; i < bufferSize; i++) {
            output[i] = (Math.random() * 2 - 1) * 0.012; // Suave siseo vintage
        }

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;
        noiseSource.connect(audioCtx.destination);
        noiseSource.start(0);
    }

    function stopNoise() {
        if (noiseSource) {
            try { noiseSource.stop(); } catch(e) {}
            noiseSource = null;
        }
    }

    // --- CONTROLES DE REPRODUCCIÓN ---
    function ejecutarPlay() {
        if (mode === 'none') return;
        isPlaying = true;
        gearL.classList.add('spinning');
        gearR.classList.add('spinning');

        if (mode === 'analog') {
            playNoise();
        } else if (mode === 'local') {
            localMp3.play();
        } else if (mode === 'spotify') {
            // Activa el play indirecto de Spotify
            spIframe.contentWindow.postMessage({command: 'toggle'}, '*');
        }
    }

    function ejecutarPause() {
        isPlaying = false;
        gearL.classList.remove('spinning');
        gearR.classList.remove('spinning');

        if (mode === 'analog') {
            stopNoise();
        } else if (mode === 'local') {
            localMp3.pause();
        }
    }

    btnPlay.addEventListener('click', ejecutarPlay);
    btnPause.addEventListener('click', ejecutarPause);

    btnEject.addEventListener('click', () => {
        ejecutarPause();
        tape.classList.remove('inserted');
        spIframe.src = "";
        spotifyInput.value = "";
        localStorage.removeItem('last_saved_playlist');
        mode = 'none';
    });
</script>
</body>
</html>
