<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Cassette Player - Notion Edition</title>
    <style>
        /* ... (MANTENGO TODO TU CSS ORIGINAL IGUAL) ... */
        :root { --bg-color: #ffffff; --container-bg: #ffffff; --text-color: #37352f; --accent-gold: #dfab01; --border-color: #e9e9e6; --visor-bg: #f1f1ef; --visor-text: #37352f; --drawer-bg: rgba(255, 255, 255, 0.95); --led-on: #eb5757; --led-off: #472424; }
        [data-theme="dark"] { --bg-color: #191919; --container-bg: #191919; --text-color: #9b9a97; --accent-gold: #ffd33d; --border-color: #2a2a2a; --visor-bg: #202020; --visor-text: #ebffff; --drawer-bg: rgba(32, 32, 32, 0.95); --led-on: #ff7373; --led-off: #3d1d1d; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; transition: background 0.2s; overflow: hidden; }
        .player-wrapper { position: relative; width: 100%; max-width: 480px; border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; background: var(--container-bg); }
        .header-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; gap: 8px; }
        .theme-toggle { background: var(--visor-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        .visor-texto { background-color: var(--visor-bg); color: var(--visor-text); font-family: monospace; font-size: 0.75rem; padding: 6px 12px; border-radius: 5px; border: 1px solid var(--border-color); text-align: center; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .grabadora-container { position: relative; width: 100%; aspect-ratio: 1.34 / 1; background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }
        .led-indicator { position: absolute; top: 45.5%; left: 14%; width: 8px; height: 8px; border-radius: 50%; background-color: var(--led-off); transition: background 0.2s; z-index: 5; }
        .led-indicator.active { background-color: var(--led-on); box-shadow: 0 0 6px var(--led-on); }
        .compartment-mask { position: absolute; top: 47.8%; left: 36.5%; width: 27%; height: 18.2%; overflow: hidden; z-index: 2; }
        .casete-asset { position: absolute; width: 100%; height: 100%; background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png'); background-size: contain; background-repeat: no-repeat; background-position: center; transition: transform 0.8s, opacity 0.5s; transform: translateY(115%); opacity: 0; z-index: 3; }
        .casete-asset.inserted { transform: translateY(0%); opacity: 1; }
        .tape-window-overlay { position: absolute; top: 36%; left: 20%; width: 60%; height: 30%; display: flex; justify-content: space-around; align-items: center; pointer-events: none; z-index: 4; }
        .reel-overlay { width: 13px; height: 13px; border-radius: 50%; border: 3px dashed #ffffff; background: rgba(0, 0, 0, 0.6); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 2s linear infinite; }
        .mapeo-botones { position: absolute; top: 44.2%; left: 24.8%; width: 50.4%; height: 6.5%; display: flex; justify-content: space-between; z-index: 10; }
        .btn-fisico { width: 24px; height: 24px; border-radius: 50%; background: transparent; border: none; cursor: pointer; }
        .settings-trigger { position: absolute; right: 14%; top: 44%; width: 26px; height: 26px; background: var(--visor-bg); border: 1px solid var(--border-color); border-radius: 50%; cursor: pointer; z-index: 12; }
        .config-drawer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--drawer-bg); border-radius: 8px; padding: 15px; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
        .config-drawer.visible { opacity: 1; pointer-events: auto; }
        .spotify-container { margin-top: 5px; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid var(--border-color); height: 152px; pointer-events: auto; }
        #file-input { display: none; }
        .vol-slider { width: 100%; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle-btn">🌓 TEMA</button>
        <div class="visor-texto" id="track-display">SISTEMA LISTO</div>
    </div>

    <div class="grabadora-container">
        <div class="led-indicator" id="status-led"></div>
        <div class="compartment-mask">
            <div class="casete-asset" id="casete-physical">
                <div class="tape-window-overlay">
                    <div class="reel-overlay" id="reel-left"></div>
                    <div class="reel-overlay" id="reel-right"></div>
                </div>
            </div>
        </div>
        <div class="mapeo-botones">
            <button class="btn-fisico" id="btn-rew"></button>
            <button class="btn-fisico" id="btn-ff"></button>
            <button class="btn-fisico" id="btn-play"></button>
            <button class="btn-fisico" id="btn-pause"></button>
            <button class="btn-fisico" id="btn-eject"></button>
            <button class="btn-fisico" id="radio-mode-btn"></button>
            <button class="btn-fisico" id="radio-off-btn"></button>
        </div>
        <button class="settings-trigger" id="settings-btn">⚙️</button>
        <div class="config-drawer" id="config-drawer">
            <div class="drawer-header"><span class="drawer-title">Configuración</span><button class="close-btn" id="close-drawer-btn">×</button></div>
            <div class="input-group">
                <label>Spotify Link</label>
                <input type="text" class="text-input" id="spotify-link" placeholder="Pegar enlace..." />
            </div>
            <div class="spotify-container" id="spotify-wrapper">
                <iframe id="spotify-iframe" width="100%" height="152" frameborder="0" allow="encrypted-media"></iframe>
            </div>
            <div class="input-group" style="margin-top: 10px;">
                <label>Audio Local</label>
                <div class="file-dropzone" id="dropzone">📁 Cargar</div>
                <input type="file" id="file-input" accept="audio/*">
            </div>
        </div>
    </div>
</div>

<script>
    // Variables y elementos (se mantienen tus originales)
    let isPlaying = false, currentMode = 'analog';
    const trackDisplay = document.getElementById('track-display');
    const spotifyLink = document.getElementById('spotify-link');
    const spotifyIframe = document.getElementById('spotify-iframe');
    const spotifyWrapper = document.getElementById('spotify-wrapper');

    // SOLUCIÓN PARA EL FOCO EN NOTION
    spotifyWrapper.addEventListener('mouseenter', () => spotifyWrapper.style.pointerEvents = 'auto');
    spotifyWrapper.addEventListener('mouseleave', () => spotifyWrapper.style.pointerEvents = 'none');

    // Función para detectar icono
    function obtenerIcono(url) {
        if (url.includes('/playlist/')) return '🎵';
        if (url.includes('/album/')) return '💿';
        return '🎧';
    }

    // Cargar enlace guardado
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('spotify_link');
        if (saved) {
            spotifyLink.value = saved;
            actualizarSpotify(saved);
        }
    });

    function actualizarSpotify(url) {
        let embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
        spotifyIframe.src = embedUrl;
        trackDisplay.textContent = `${obtenerIcono(url)} SPOTIFY LISTO`;
        localStorage.setItem('spotify_link', url);
    }

    spotifyLink.addEventListener('input', (e) => {
        const url = e.target.value.trim();
        if (url.includes('spotify.com')) actualizarSpotify(url);
    });

    // ... (El resto de tus funciones originales permanecen intactas debajo)
    const configDrawer = document.getElementById('config-drawer');
    document.getElementById('settings-btn').onclick = () => configDrawer.classList.add('visible');
    document.getElementById('close-drawer-btn').onclick = () => configDrawer.classList.remove('visible');
    
    // NOTA: El resto de tu lógica (Audio, botones, etc.) funciona igual.
</script>
</body>
</html>
