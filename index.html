<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mi Juego en Notion</title>
  <!-- Cargamos el motor de juegos Kaboom desde internet -->
  <script src="https://unpkg.com/kaboom@3000.0.1/dist/kaboom.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; margin: 0 auto; }
  </style>
</head>
<body>
<script>

// Inicializamos el juego con pantalla pequeña para que entre en Notion
kaboom({
    width: 320,
    height: 240,
    background: [ 20, 20, 30 ],
    scale: 1.5,
});

// Diseñamos el personaje principal (un cuadrado rosa)
const player = add([
    rect(20, 20),
    pos(40, 80),
    area(),
    body(),
    color(255, 105, 180),
]);

// Ponemos un suelo
add([
    rect(width(), 20),
    pos(0, 200),
    area(),
    body({ isStatic: true }),
    color(80, 80, 100),
]);

// Al presionar espacio o hacer clic, salta y hace un sonido arcade real
onKeyPress("space", jumpPlayer);
onClick(jumpPlayer);

function jumpPlayer() {
    if (player.isGrounded()) {
        player.jump(300);
        // Genera un sonido de salto directo desde la placa de audio del navegador (sin archivos externos)
        playTone(440, 0.1); 
    }
}

// Generador de obstáculos automáticos
loop(2, () => {
    add([
        rect(15, 30),
        pos(width(), 170),
        area(),
        color(0, 255, 255),
        move(LEFT, 120),
        "obstacle",
    ]);
});

// Si chocas un obstáculo, tiembla la pantalla, suena un pitido y se reinicia
player.onCollide("obstacle", () => {
    shake(10);
    playTone(150, 0.3);
    go("lose");
});

// Pantalla de derrota rápida
scene("lose", () => {
    add([
        text("GAME OVER\nClic para jugar", { size: 16 }),
        pos(center()),
        anchor("center"),
    ]);
    onClick(() => {
        go("main");
    });
});

scene("main", () => {
    // Reinicia el juego
    location.reload();
});

// Función simple para generar sonidos reales sin usar archivos .mp3
function playTone(freq, duration) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
}

</script>
</body>
</html>
