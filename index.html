<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Retro Casete Real</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      /* Activamos la perspectiva 3D global para el ojo */
      perspective: 1000px;
    }

    /* Estructura base del aparato */
    .grabadora-container {
      position: relative;
      width: 450px;
      height: 320px;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* LA CASANTERA / COMPARTIMENTO: El espacio físico de la compuerta */
    .casetera-zone {
      position: absolute;
      top: 102px; /* Centrado en el hueco de la compuerta */
      left: 76px;
      width: 148px;
      height: 94px;
      /* Entorno 3D interno */
      transform-style: preserve-3d;
    }

    /* EL CASETE ROJO: Modificá los valores de abajo si querés moverlo de posición */
    .casete {
      position: absolute;
      width: 136px;
      height: 84px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      
      /* AJUSTE DE POSICIÓN INICIAL */
      left: 6px;
      top: 5px;
      
      /* EL TRUCO REALISTA (Como tu foto de anime): 
         Lo empujamos un poco hacia el fondo (translateZ) e inclinamos la parte 
         superior hacia atrás (rotateX) para que calce en la ranura */
      transform: translateZ(-15px) rotateX(-12deg);
      
      /* Ajuste de sombra para dar volumen dentro del hueco */
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.6));
    }
  </style>
</head>
<body>

  <div class="grabadora-container">
    <!-- La casetera maneja la tridimensionalidad -->
    <div class="casetera-zone">
      <!-- El casete ahora descansa inclinado adentro, no flotando atrás -->
      <div class="casete"></div>
    </div>
  </div>

</body>
</html>
