<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Roja Retro</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      overflow: hidden;
    }

    /* Contenedor principal con la imagen de tu grabadora roja */
    .boombox-container {
      position: relative;
      width: 450px;
      height: 320px;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* El compartimento donde se mete el casete */
    .cassette-slot {
      position: absolute;
      top: 102px;
      left: 77px;
      width: 146px;
      height: 94px;
      overflow: hidden;
      border-radius: 4px;
    }

    /* El casete rojo que se desliza */
    .cassette-tape {
      position: absolute;
      top: -110px; /* Escondido arriba por defecto */
      left: 3px;
      width: 140px;
      height: 88px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      transition: top 1s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
    }

    /* Clase que activa la animación de inserción */
    .cassette-tape.inserted {
      top: 3px; /* Se desliza dentro de la grabadora */
    }

    /* Engranajes que giran encima del casete */
    .spindle {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 3px dotted #111;
      border-radius: 50%;
      top: 38px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .spindle.left { left: 42px; }
    .spindle.right { right: 84px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Pantallita digital (Display) */
    .display-area {
      position: absolute;
      top: 108px;
      left: 242px;
      width: 130px;
      height: 38px;
      background: #0b0c0e;
      border-radius: 3px;
      box-shadow: inset 0 0 5px #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff3333; /* Color rojo digital */
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      overflow: hidden;
    }

    /* MENÚ DE PLAYLISTS RÁPIDAS: Aparece solo al pasar el mouse por el display */
    .quick-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 4px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 3px;
    }

    .display-area:hover .quick-menu {
      opacity: 1;
      pointer-events: auto;
    }

    .playlist-btn {
      background: #222;
      color: #ff3333;
      border: 1px solid #ff3333;
      font-size: 8px;
      font-family: monospace;
      padding: 3px 5px;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .playlist-btn:hover {
      background: #ff3333;
      color: #000;
    }

    /* REPRODUCTOR DE SPOTIFY 100% INVISIBLE Y OCULTO PERMANENTEMENTE */
    .player-hidden-container {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BOTONES FÍSICOS DE LA IMAGEN (Encima de las teclas rojas de plástico) */
    .physical-buttons {
      position: absolute;
      top: 48px;
      left: 88px;
      width: 140px;
      height: 25px;
      display: flex;
      justify-content: space-between;
    }

    .hidden-btn {
      width: 20px;
      height: 100%;
      background: rgba(255, 255, 255, 0);
      border: none;
      cursor: pointer;
    }

    .hidden-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>

  <div class="boombox-container">
    
    <!-- Botones físicos mapeados -->
    <div class="physical-buttons">
      <button class="hidden-btn" title="Grabar/Power" onclick="togglePower()"></button>
      <button class="hidden-btn" title="Play" onclick="pressPlay()"></button>
      <button class="hidden-btn" title="Retroceder"></button>
      <button class="hidden-btn" title="Avanzar"></button>
      <button class="hidden-btn" title="Stop" onclick="pressStop()"></button>
      <button class="hidden-btn" title="Pausa" onclick="pressStop()"></button>
    </div>

    <!-- Compartimento del Casete con animación -->
    <div class="cassette-slot">
      <div class="cassette-tape" id="myTape"></div>
      <div class="spindle left" id="spindleL"></div>
      <div class="spindle right" id="spindleR"></div>
    </div>

    <!-- Display con Botones de Selección Rápida al pasar el mouse -->
    <div class="display-area">
      <div id="statusText">POWER OFF</div>
      <div style="font-size: 7px; color: #555; margin-top: 2px;">HOVER FOR MUSIC ♫</div>
      
      <!-- Menú rápido -->
      <div class="quick-menu">
        <button class="playlist-btn" onclick="selectPlaylist('pop')">GIRLS</button>
        <button class="playlist-btn" onclick="selectPlaylist('chill')">CHILL</button>
        <button class="playlist-btn" onclick="selectPlaylist('rock')">ROCK</button>
      </div>
    </div>

    <!-- El "Fantasma" de Spotify (invisible para siempre) -->
    <div class="player-hidden-container">
      <iframe id="musicFrame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

  </div>

  <script>
    const tape = document.getElementById('myTape');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;
    let tapeLoaded = false;
    let isPlaying = false;

    // CONFIGURA TUS PLAYLISTS AQUÍ (URL de inserción directa)
    const playlists = {
      pop: "https://open.spotify.com/embed/playlist/4rvFfn0CYCjEYWBB7qoA1t", 
      chill: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO", 
      rock: "https://open.spotify.com/embed/playlist/37i9dQZF1DX3YSRunb9vDc"   
    };

    window.onload = () => {
      const lastActive = localStorage.getItem('lastSelectedPlaylist') || 'pop';
      loadPlaylistLink(playlists[lastActive]);
      insertTape(true);
    };

    function selectPlaylist(key) {
      if (!isPowerOn) {
        statusText.innerText = "TURN ON POWER";
        return;
      }
      localStorage.setItem('lastSelectedPlaylist', key);
      loadPlaylistLink(playlists[key]);
      insertTape(true);
      statusText.innerText = key.toUpperCase();
    }

    function loadPlaylistLink(url) {
      // Le mandamos la orden de autoplay por las dudas si el navegador la acepta
      musicFrame.src = url + "?autoplay=1"; 
    }

    function insertTape(shouldInsert) {
      if (shouldInsert) {
        tape.classList.add('inserted');
        tapeLoaded = true;
      } else {
        tape.classList.remove('inserted');
        tapeLoaded = false;
        spinCassette(false);
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        const lastActive = localStorage.getItem('lastSelectedPlaylist') || 'pop';
        statusText.innerText = lastActive.toUpperCase();
      } else {
        statusText.innerText = "POWER OFF";
        pressStop();
      }
    }

    // El botón físico PLAY ahora manda el comando de reproducción al reproductor oculto
    function pressPlay() {
      if (!isPowerOn || !tapeLoaded) return;
      
      // Enviamos el comando de reproducción al iframe oculto
      musicFrame.contentWindow.postMessage({command: 'togglePlay'}, '*');
      
      isPlaying = true;
      spinCassette(true);
    }

    // Los botones STOP/PAUSE detienen el reproductor y la animación
    function pressStop() {
      musicFrame.contentWindow.postMessage({command: 'pause'}, '*');
      isPlaying = false;
      spinCassette(false);
    }

    function spinCassette(shouldSpin) {
      if (shouldSpin && isPlaying) {
        spindleL.style.opacity = "0.7";
        spindleR.style.opacity = "0.7";
        spindleL.style.animation = "spin 1.5s linear infinite";
        spindleR.style.animation = "spin 1.5s linear infinite";
        statusText.innerText = "RUNNING";
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        spindleL.style.opacity = "0";
        spindleR.style.opacity = "0";
        if (isPowerOn) statusText.innerText = "STOPPED";
      }
    }
  </script>
</body>
</html>
