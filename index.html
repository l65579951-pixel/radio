<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Roja Retro</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      overflow: hidden;
    }

    .boombox-container {
      position: relative;
      width: 450px;
      height: 320px;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .cassette-slot {
      position: absolute;
      top: 102px;
      left: 77px;
      width: 146px;
      height: 94px;
      overflow: hidden;
      border-radius: 4px;
    }

    .cassette-tape {
      position: absolute;
      top: -110px; 
      left: 3px;
      width: 140px;
      height: 88px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      transition: top 1s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
    }

    .cassette-tape.inserted {
      top: 3px; 
    }

    .spindle {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 3px dotted #111;
      border-radius: 50%;
      top: 38px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .spindle.left { left: 42px; }
    .spindle.right { right: 84px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .display-area {
      position: absolute;
      top: 108px;
      left: 242px;
      width: 130px;
      height: 38px;
      background: #0b0c0e;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff3333;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* EL PANEL SECRETO: Esconde las playlists y el reproductor real juntos */
    .control-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 20;
      border-radius: 12px;
    }

    /* Cuando pasás el mouse por la pantalla digital, se revela el control de música */
    .display-area:hover .control-overlay {
      position: fixed;
      top: calc(50% - 60px);
      left: calc(50% - 160px);
      width: 320px;
      height: 150px;
      padding: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 3px solid #ff3333;
      opacity: 1;
      pointer-events: auto;
    }

    .menu-title {
      color: #ff3333;
      font-size: 10px;
      margin-bottom: 2px;
      text-align: center;
      width: 100%;
    }

    .btn-group {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
    }

    .playlist-btn {
      background: #222;
      color: #ff3333;
      border: 1px solid #ff3333;
      font-size: 8px;
      font-family: monospace;
      padding: 3px 6px;
      cursor: pointer;
      border-radius: 2px;
    }

    .playlist-btn:hover {
      background: #ff3333;
      color: #000;
    }

    .player-frame-wrapper {
      width: 100%;
      height: 80px;
      border-radius: 4px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .physical-buttons {
      position: absolute;
      top: 48px;
      left: 88px;
      width: 140px;
      height: 25px;
      display: flex;
      justify-content: space-between;
    }

    .hidden-btn {
      width: 20px;
      height: 100%;
      background: rgba(255, 255, 255, 0);
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="boombox-container">
    
    <!-- Botones estéticos de la imagen -->
    <div class="physical-buttons">
      <button class="hidden-btn" title="Power" onclick="togglePower()"></button>
      <button class="hidden-btn" title="Play" onclick="spinCassette(true)"></button>
      <button class="hidden-btn" title="Rewind"></button>
      <button class="hidden-btn" title="FastForward"></button>
      <button class="hidden-btn" title="Stop" onclick="spinCassette(false)"></button>
      <button class="hidden-btn" title="Pause" onclick="spinCassette(false)"></button>
    </div>

    <!-- Compartimento animado -->
    <div class="cassette-slot">
      <div class="cassette-tape" id="myTape"></div>
      <div class="spindle left" id="spindleL"></div>
      <div class="spindle right" id="spindleR"></div>
    </div>

    <!-- Pantalla digital con el truco flotante -->
    <div class="display-area">
      <div id="statusText">POWER OFF</div>
      <div style="font-size: 7px; color: #555; margin-top: 2px;">CONFIGURAR ✎</div>
      
      <!-- Este recuadro solo aparece flotando cuando ponés el mouse en CONFIGURAR -->
      <div class="control-overlay">
        <div class="menu-title">SELECCIONÁ Y DALE PLAY EN SPOTIFY:</div>
        <div class="btn-group">
          <button class="playlist-btn" onclick="selectPlaylist('pop')">GIRLS</button>
          <button class="playlist-btn" onclick="selectPlaylist('chill')">CHILL</button>
          <button class="playlist-btn" onclick="selectPlaylist('rock')">ROCK</button>
        </div>
        <div class="player-frame-wrapper">
          <iframe id="musicFrame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
      </div>
    </div>

  </div>

  <script>
    const tape = document.getElementById('myTape');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;
    let tapeLoaded = false;

    const playlists = {
      pop: "https://open.spotify.com/embed/playlist/4rvFfn0CYCjEYWBB7qoA1t", 
      chill: "https://open.spotify.com/embed/playlist/37i9dQZF1DX4sWSpwq3LiO", 
      rock: "https://open.spotify.com/embed/playlist/37i9dQZF1DX3YSRunb9vDc"   
    };

    window.onload = () => {
      const lastActive = localStorage.getItem('lastSelectedPlaylist') || 'pop';
      musicFrame.src = playlists[lastActive];
      insertTape(true);
    };

    function selectPlaylist(key) {
      if (!isPowerOn) return;
      localStorage.setItem('lastSelectedPlaylist', key);
      musicFrame.src = playlists[key];
      statusText.innerText = key.toUpperCase();
    }

    function insertTape(shouldInsert) {
      if (shouldInsert) {
        tape.classList.add('inserted');
        tapeLoaded = true;
      } else {
        tape.classList.remove('inserted');
        tapeLoaded = false;
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        const lastActive = localStorage.getItem('lastSelectedPlaylist') || 'pop';
        statusText.innerText = lastActive.toUpperCase();
      } else {
        statusText.innerText = "POWER OFF";
        spinCassette(false);
      }
    }

    function spinCassette(shouldSpin) {
      if (!isPowerOn || !tapeLoaded) return;
      if (shouldSpin) {
        spindleL.style.opacity = "0.7";
        spindleR.style.opacity = "0.7";
        spindleL.style.animation = "spin 1.5s linear infinite";
        spindleR.style.animation = "spin 1.5s linear infinite";
        statusText.innerText = "RUNNING";
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        spindleL.style.opacity = "0";
        spindleR.style.opacity = "0";
        statusText.innerText = "STOPPED";
      }
    }
  </script>
</body>
</html>
