<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casete Camuflado Spotify</title>
    <style>
        :root {
            --bg-color: #f0ebe1;
            --panel-color: #2c2c2c;
            --deck-color: #1a1a1a;
            --tape-body: #4a3b32;
            --label-color: #f1f1f1;
            --text-color: #333;
            --widget-bg: #ffffff;
            --input-border: #ccc;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --deck-color: #0c0c0c;
            --tape-body: #2c2420;
            --label-color: #d1d1d1;
            --text-color: #f1f1f1;
            --widget-bg: #222222;
            --input-border: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--widget-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            box-sizing: border-box;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* CONFIGURACIÓN DE PLAYLIST */
        .setup-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--widget-bg);
            color: var(--text-color);
        }

        button.btn-save {
            background: #1DB954;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* GRABADORA DE CASETE */
        .cassette-player {
            background-color: var(--panel-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            position: relative; /* Clave para posicionar el iframe encima */
        }

        /* Ventana del Casete */
        .tape-deck {
            background-color: var(--deck-color);
            height: 140px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #3d3d3d;
        }

        .cassette {
            width: 220px;
            height: 100px;
            background-color: var(--tape-body);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            box-sizing: border-box;
        }

        .cassette-label {
            background-color: var(--label-color);
            height: 50px;
            border-radius: 4px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .reel {
            width: 34px;
            height: 34px;
            background-color: #111;
            border-radius: 50%;
            border: 3px dashed #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel::after {
            content: '';
            width: 12px;
            height: 12px;
            background-color: var(--deck-color);
            border-radius: 50%;
        }

        /* BOTONES MECÁNICOS FACHADA */
        .controls-wrapper {
            position: relative; /* Contenedor para el truco de superposición */
            margin-top: 20px;
            height: 80px; /* Misma altura que el reproductor compacto de Spotify */
        }

        .controls-background {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Detrás del iframe invisible */
        }

        .btn-mechanic {
            flex: 1;
            background: linear-gradient(180deg, #555, #222);
            border: 1px solid #111;
            border-radius: 4px;
            color: #ddd;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0px #000;
        }

        /* EL TRUCO: EL IFRAME TOTALMENTE INVISIBLE ENCIMA DE LOS BOTONES */
        .spotify-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* ENCIMA de los botones para capturar los clics */
            opacity: 0; /* Totalmente invisible por defecto */
            transition: opacity 0.2s;
        }

        /* CONTROLES DE CALIBRACIÓN (Solo para el dueño/desarrollador) */
        .calibration-panel {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .calibration-panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Casete Inteligente</h2>
        <button onclick="toggleTheme()" style="background:none; border:1px solid var(--text-color); color:var(--text-color); border-radius:12px; cursor:pointer; padding:2px 8px;">Tema</button>
    </div>

    <!-- 1. ENLACE DE PLAYLIST -->
    <div class="setup-panel">
        <input type="text" id="playlist-input" placeholder="Pega el enlace de Spotify aquí">
        <button class="btn-save" onclick="loadPlaylist()">Cargar</button>
    </div>

    <!-- REPRODUCTOR -->
    <div class="cassette-player">
        
        <!-- Casete visual -->
        <div class="tape-deck">
            <div class="cassette">
                <div style="height: 5px;"></div>
                <div class="cassette-label">
                    <div class="reel" id="left-reel"></div>
                    <div style="width: 40px; height: 8px; background: #222; border-radius: 4px;"></div>
                    <div class="reel" id="right-reel"></div>
                </div>
                <div style="height: 5px;"></div>
            </div>
        </div>

        <!-- ZONA DE BOTONES (FACHADA + CAPA INVISIBLE DE SPOTIFY) -->
        <div class="controls-wrapper">
            
            <!-- Botones estéticos detrás -->
            <div class="controls-background">
                <div class="btn-mechanic"><span>⏪</span><span>REW</span></div>
                <!-- El botón de Play de Spotify suele estar en el centro/izquierda en el widget compacto -->
                <div class="btn-mechanic" style="background: linear-gradient(180deg, #666, #333);"><span>▶/⏸</span><span>PLAY</span></div>
                <div class="btn-mechanic"><span>⏩</span><span>F.F</span></div>
            </div>

            <!-- Iframe de Spotify Invisible flotando exactamente encima -->
            <div class="spotify-overlay" id="spotify-container">
                <!-- Se genera aquí -->
            </div>
        </div>
    </div>

    <!-- PANEL DE CALIBRACIÓN (Desliza para ver la magia) -->
    <div class="calibration-panel">
        <label>
            <span>Ver Reproductor Real (Calibrar):</span>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0" oninput="adjustOpacity(this.value)">
        </label>
        <p style="margin: 5px 0 0 0; font-size: 0.7rem; color: #777; text-align: center;">
            Alinea tu clic. En 0% el Spotify real es invisible, ¡pero sigue siendo interactivo!
        </p>
    </div>
</div>

<script>
    // Playlist por defecto (puedes cambiarla por la tuya fija si quieres)
    let currentPlaylist = localStorage.getItem('lastPlaylist') || 'https://open.spotify.com/playlist/37i9dQZF1DXcBWIGv263vj';

    window.onload = () => {
        document.getElementById('playlist-input').value = currentPlaylist;
        buildSpotifyIframe(currentPlaylist);
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    };

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    // Convierte el link normal a formato Embed
    function cleanSpotifyUrl(url) {
        if (!url) return '';
        if (url.includes('spotify.com') && !url.includes('/embed')) {
            return url.replace('spotify.com/', 'spotify.com/embed/');
        }
        return url;
    }

    function buildSpotifyIframe(url) {
        const container = document.getElementById('spotify-container');
        const cleanUrl = cleanSpotifyUrl(url);
        
        if (cleanUrl) {
            // Usamos el reproductor compacto de Spotify (80px de alto)
            container.innerHTML = `
                <iframe 
                    src="${cleanUrl}?utm_source=generator&theme=0" 
                    width="100%" 
                    height="80" 
                    frameBorder="0" 
                    allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    style="border-radius: 4px;">
                </iframe>`;
        }
    }

    function loadPlaylist() {
        const inputVal = document.getElementById('playlist-input').value.trim();
        if (inputVal) {
            currentPlaylist = inputVal;
            localStorage.setItem('lastPlaylist', currentPlaylist);
            buildSpotifyIframe(currentPlaylist);
        }
    }

    // Control de transparencia para calibración
    function adjustOpacity(value) {
        const spotify = document.getElementById('spotify-container');
        spotify.style.opacity = value;
    }
</script>

</body>
</html>
