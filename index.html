<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Roja Retro</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      overflow: hidden;
    }

    /* Contenedor principal con la imagen de tu grabadora roja */
    .boombox-container {
      position: relative;
      width: 450px;
      height: 320px;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* El compartimento donde se mete el casete */
    .cassette-slot {
      position: absolute;
      top: 102px;
      left: 77px;
      width: 146px;
      height: 94px;
      overflow: hidden;
      border-radius: 4px;
    }

    /* El casete rojo que se desliza */
    .cassette-tape {
      position: absolute;
      top: -110px; /* Escondido arriba por defecto */
      left: 3px;
      width: 140px;
      height: 88px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      transition: top 1s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
    }

    /* Clase que activa la animación de inserción */
    .cassette-tape.inserted {
      top: 3px; /* Se desliza dentro de la grabadora */
    }

    /* Engranajes invisibles que giran encima del casete insertado */
    .spindle {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 3px dotted #111;
      border-radius: 50%;
      top: 38px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .spindle.left { left: 42px; }
    .spindle.right { right: 84px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Pantallita digital para configuraciones (Display) */
    .display-area {
      position: absolute;
      top: 108px;
      left: 242px;
      width: 130px;
      height: 38px;
      background: #0b0c0e;
      border-radius: 3px;
      box-shadow: inset 0 0 5px #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff3333; /* Color rojo digital */
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* INPUT SECRETO: Aparece solo al pasar el mouse por el display */
    .input-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 3px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 3px;
    }

    .display-area:hover .input-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .input-overlay input {
      width: 70%;
      background: #111;
      border: 1px solid #ff3333;
      color: #ff3333;
      font-size: 8px;
      font-family: monospace;
      padding: 2px;
    }

    .input-overlay button {
      background: #ff3333;
      color: #000;
      border: none;
      font-size: 8px;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 4px;
    }

    /* REPRODUCTOR DE SPOTIFY OCULTO (Se desliza desde abajo al pasar el mouse por la grabadora) */
    .player-drawer {
      position: absolute;
      bottom: -65px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 80px;
      transition: bottom 0.4s ease;
      z-index: 10;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .boombox-container:hover .player-drawer {
      bottom: -40px; /* Se asoma para que puedas tocar los controles de Spotify */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BOTONES FÍSICOS DE LA IMAGEN (Mapeados encima de las teclas de plástico) */
    .physical-buttons {
      position: absolute;
      top: 48px;
      left: 88px;
      width: 140px;
      height: 25px;
      display: flex;
      justify-content: space-between;
    }

    .hidden-btn {
      width: 20px;
      height: 100%;
      background: rgba(255, 255, 255, 0); /* Totalmente transparente */
      border: none;
      cursor: pointer;
    }

    .hidden-btn:active {
      background: rgba(255, 255, 255, 0.15); /* Feedback sutil de click */
    }
  </style>
</head>
<body>

  <div class="boombox-container">
    
    <!-- Botones mapeados encima de los de plástico rojo -->
    <div class="physical-buttons">
      <button class="hidden-btn" title="Grabar/Power" onclick="togglePower()"></button>
      <button class="hidden-btn" title="Play" onclick="spinCassette(true)"></button>
      <button class="hidden-btn" title="Retroceder"></button>
      <button class="hidden-btn" title="Avanzar"></button>
      <button class="hidden-btn" title="Stop" onclick="spinCassette(false)"></button>
      <button class="hidden-btn" title="Pausa" onclick="spinCassette(false)"></button>
    </div>

    <!-- Compartimento de Casete -->
    <div class="cassette-slot">
      <div class="cassette-tape" id="myTape"></div>
      <!-- Engranajes que giran encima -->
      <div class="spindle left" id="spindleL"></div>
      <div class="spindle right" id="spindleR"></div>
    </div>

    <!-- Display Digital con Entrada Secreta de Link -->
    <div class="display-area">
      <div id="statusText">POWER OFF</div>
      <div style="font-size: 7px; color: #555; margin-top: 2px;">HOVER PARA LINK ✎</div>
      
      <div class="input-overlay">
        <input type="text" id="playlistUrl" placeholder="Link de Spotify...">
        <button onclick="loadPlaylist()">OK</button>
      </div>
    </div>

    <!-- Cajón deslizable de Spotify -->
    <div class="player-drawer">
      <iframe id="musicFrame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

  </div>

  <script>
    const tape = document.getElementById('myTape');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const playlistInput = document.getElementById('playlistUrl');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;
    let tapeLoaded = false;

    window.onload = () => {
      const savedLink = localStorage.getItem('userPlaylistStream');
      if (savedLink) {
        playlistInput.value = savedLink;
        processAndLoadLink(savedLink);
        // Si ya hay un link guardado, metemos el casete automáticamente
        setTimeout(() => {
          insertTape(true);
        }, 500);
      }
    };

    function processAndLoadLink(rawLink) {
      let embedUrl = "";
      if (rawLink.includes("spotify.com")) {
        embedUrl = rawLink.replace("open.spotify.com/", "open.spotify.com/embed/");
      } else if (rawLink.includes("youtube.com") || rawLink.includes("youtu.be")) {
        let videoId = "";
        if (rawLink.includes("watch?v=")) {
          videoId = rawLink.split("v=")[1].split("&")[0];
        } else if (rawLink.includes("youtu.be/")) {
          videoId = rawLink.split("youtu.be/")[1].split("?")[0];
        }
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      } else {
        embedUrl = rawLink;
      }
      musicFrame.src = embedUrl;
    }

    function loadPlaylist() {
      const link = playlistInput.value.trim();
      if (link) {
        localStorage.setItem('userPlaylistStream', link);
        processAndLoadLink(link);
        insertTape(true);
        if (isPowerOn) {
          statusText.innerText = "TAPE READY";
        }
      }
    }

    // Animación de meter / sacar el casete
    function insertTape(shouldInsert) {
      if (shouldInsert) {
        tape.classList.add('inserted');
        tapeLoaded = true;
      } else {
        tape.classList.remove('inserted');
        tapeLoaded = false;
        spinCassette(false);
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        statusText.innerText = tapeLoaded ? "TAPE READY" : "NO TAPE";
      } else {
        statusText.innerText = "POWER OFF";
        spinCassette(false);
      }
    }

    function spinCassette(shouldSpin) {
      if (!isPowerOn || !tapeLoaded) return;
      if (shouldSpin) {
        spindleL.style.opacity = "0.7";
        spindleR.style.opacity = "0.7";
        spindleL.style.animation = "spin 1.5s linear infinite";
        spindleR.style.animation = "spin 1.5s linear infinite";
        statusText.innerText = "RUNNING";
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        spindleL.style.opacity = "0";
        spindleR.style.opacity = "0";
        statusText.innerText = "STOPPED";
      }
    }
  </script>
</body>
</html>
