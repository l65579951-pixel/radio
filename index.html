<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabadora Roja Retro Corregida</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: monospace;
      overflow: hidden;
      perspective: 800px; /* Habilita el entorno 3D para la inserción */
    }

    .widget-wrapper {
      position: relative;
      width: 450px;
      height: 320px;
    }

    /* CAPA INFERIOR: Spotify oculto físicamente detrás */
    .spotify-underlay {
      position: absolute;
      top: 110px;
      left: 77px;
      width: 300px;
      height: 80px;
      z-index: 1;
    }

    /* CAPA MEDIA: La grabadora roja */
    .boombox-front {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 5;
      pointer-events: none;
    }

    /* Ranura del casete */
    .cassette-slot {
      position: absolute;
      top: 102px;
      left: 77px;
      width: 146px;
      height: 94px;
      z-index: 6;
      pointer-events: none;
      transform-style: preserve-3d;
    }

    /* EL CASETE: Ahora empieza inclinado y fuera de eje, simulando la mano introduciéndolo */
    .cassette-tape {
      position: absolute;
      top: -60px;
      left: 3px;
      width: 140px;
      height: 88px;
      background-image: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0;
      /* Animación en diagonal con inclinación simulando la imagen */
      transform: translateY(-20px) translateZ(50px) rotateX(-35deg);
      transition: all 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* CUANDO SE INSERTA: Entra en diagonal al fondo y se endereza al encastrar */
    .cassette-tape.inserted {
      top: 3px;
      opacity: 1;
      transform: translateY(0) translateZ(0) rotateX(0deg);
    }

    /* Engranajes de rotación */
    .spindle {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 3px dotted #111;
      border-radius: 50%;
      top: 38px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .spindle.left { left: 42px; }
    .spindle.right { right: 84px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Pantalla Digital */
    .display-area {
      position: absolute;
      top: 108px;
      left: 242px;
      width: 130px;
      height: 38px;
      background: #0b0c0e;
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ff3333;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 7;
    }

    .input-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 3px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 3px;
    }

    .display-area:hover .input-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .input-overlay input {
      width: 70%;
      background: #111;
      border: 1px solid #ff3333;
      color: #ff3333;
      font-size: 8px;
      font-family: monospace;
      padding: 2px;
    }

    .input-overlay button {
      background: #ff3333;
      color: #000;
      border: none;
      font-size: 8px;
      font-weight: bold;
      cursor: pointer;
      padding: 2px 4px;
    }

    /* Botones de control físico */
    .physical-buttons {
      position: absolute;
      top: 48px;
      left: 88px;
      width: 140px;
      height: 25px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
    }

    .hidden-btn {
      width: 20px;
      height: 100%;
      background: rgba(255, 255, 255, 0);
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="widget-wrapper">
    
    <!-- FANTASMA: Spotify abajo -->
    <div class="spotify-underlay">
      <iframe id="musicFrame" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- FACHADA: Grabadora -->
    <div class="boombox-front"></div>

    <!-- RANURA Y CASETE 3D -->
    <div class="cassette-slot">
      <div class="cassette-tape" id="myTape"></div>
      <div class="spindle left" id="spindleL"></div>
      <div class="spindle right" id="spindleR"></div>
    </div>

    <!-- Mapeo de botones físicos -->
    <div class="physical-buttons">
      <button class="hidden-btn" title="Power" onclick="togglePower()"></button>
      <button class="hidden-btn" title="Play" onclick="spinCassette(true)"></button>
      <button class="hidden-btn" title="Rewind"></button>
      <button class="hidden-btn" title="FastForward"></button>
      <button class="hidden-btn" title="Stop" onclick="spinCassette(false)"></button>
      <button class="hidden-btn" title="Pause" onclick="spinCassette(false)"></button>
    </div>

    <!-- Buscador en el Display -->
    <div class="display-area">
      <div id="statusText">POWER OFF</div>
      <div style="font-size: 7px; color: #555; margin-top: 2px;">PEGAR LINK ✎</div>
      
      <div class="input-overlay">
        <input type="text" id="playlistUrl" placeholder="Link de Spotify...">
        <button onclick="loadPlaylist()">OK</button>
      </div>
    </div>

  </div>

  <script {nonce}>
    const tape = document.getElementById('myTape');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const playlistInput = document.getElementById('playlistUrl');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;
    let tapeLoaded = false;

    window.onload = () => {
      const savedLink = localStorage.getItem('userPlaylistStream');
      if (savedLink) {
        playlistInput.value = savedLink;
        processAndLoadLink(savedLink);
        setTimeout(() => {
          insertTape(true);
        }, 600);
      }
    };

    function processAndLoadLink(rawLink) {
      let embedUrl = "";
      if (rawLink.includes("spotify.com")) {
        embedUrl = rawLink.replace("open.spotify.com/", "open.spotify.com/embed/");
      } else if (rawLink.includes("youtube.com") || rawLink.includes("youtu.be")) {
        let videoId = "";
        if (rawLink.includes("watch?v=")) {
          videoId = rawLink.split("v=")[1].split("&")[0];
        } else if (rawLink.includes("youtu.be/")) {
          videoId = rawLink.split("youtu.be/")[1].split("?")[0];
        }
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      } else {
        embedUrl = rawLink;
      }
      musicFrame.src = embedUrl;
    }

    function loadPlaylist() {
      const link = playlistInput.value.trim();
      if (link) {
        localStorage.setItem('userPlaylistStream', link);
        processAndLoadLink(link);
        insertTape(true);
        if (isPowerOn) statusText.innerText = "TAPE READY";
      }
    }

    function insertTape(shouldInsert) {
      if (shouldInsert) {
        tape.classList.add('inserted');
        tapeLoaded = true;
      } else {
        tape.classList.remove('inserted');
        tapeLoaded = false;
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        statusText.innerText = tapeLoaded ? "TAPE READY" : "NO TAPE";
      } else {
        statusText.innerText = "POWER OFF";
        spinCassette(false);
      }
    }

    function spinCassette(shouldSpin) {
      if (!isPowerOn || !tapeLoaded) return;
      if (shouldSpin) {
        spindleL.style.opacity = "0.7";
        spindleR.style.opacity = "0.7";
        spindleL.style.animation = "spin 1.5s linear infinite";
        spindleR.style.animation = "spin 1.5s linear infinite";
        statusText.innerText = "RUNNING";
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        spindleL.style.opacity = "0";
        spindleR.style.opacity = "0";
        statusText.innerText = "STOPPED";
      }
    }
  </script>
</body>
</html>
