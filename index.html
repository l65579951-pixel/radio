<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Cassette Widget</title>
  <style>
    /* Variables para Modo Claro y Oscuro automáticos */
    :root {
      --bg-color: #f4f4f5;
      --deck-bg: #2d2d30;
      --deck-border: #1e1e21;
      --text-color: #ffffff;
      --display-bg: #0f1015;
      --display-text: #00ff66;
      --btn-grad-start: #5a5a60;
      --btn-grad-end: #3a3a3d;
      --input-bg: #1e1e21;
      --input-text: #ccc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
        --deck-bg: #1a1a1c;
        --deck-border: #0d0d0e;
        --input-bg: #0f1015;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.3s ease;
    }

    /* La Grabadora de Casete (Deck) */
    .cassette-deck {
      background: var(--deck-bg);
      border: 4px solid var(--deck-border);
      border-radius: 12px;
      padding: 20px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Parte Superior: Compartimento del casete y Display */
    .deck-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    /* El compartimento donde gira el casete */
    .cassette-pocket {
      width: 180px;
      height: 110px;
      background: #0f0f12;
      border: 3px solid #3e3e42;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Los engranajes del casete que giran al dar PLAY */
    .spindle {
      width: 30px;
      height: 30px;
      background: #333;
      border: 5px dotted #666;
      border-radius: 50%;
      position: absolute;
      transition: transform 0.1s linear;
    }
    .spindle.left { left: 45px; }
    .spindle.right { right: 45px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Display Digital (Sintonizador/Info) */
    .deck-display {
      flex-grow: 1;
      background: var(--display-bg);
      border-radius: 6px;
      border: 2px solid #222;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 90px;
    }

    .display-status {
      font-family: monospace;
      color: var(--display-text);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .display-time {
      font-family: monospace;
      color: var(--display-text);
      font-size: 18px;
      text-align: right;
      text-shadow: 0 0 5px var(--display-text);
    }

    /* Entrada interna de la Playlist (Ocultable) */
    .playlist-input-area {
      display: flex;
      gap: 8px;
    }

    .playlist-input-area input {
      flex-grow: 1;
      background: var(--input-bg);
      border: 1px solid #444;
      border-radius: 4px;
      color: var(--input-text);
      padding: 6px 10px;
      font-size: 11px;
    }

    .playlist-input-area button {
      background: #505055;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    /* Botonera de control físico */
    .deck-controls {
      display: flex;
      justify-content: space-between;
      background: #151517;
      padding: 8px;
      border-radius: 6px;
    }

    .btn {
      background: linear-gradient(180deg, var(--btn-grad-start), var(--btn-grad-end));
      border: 1px solid #111;
      color: #eee;
      padding: 8px 10px;
      font-size: 9px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 2px 3px rgba(0,0,0,0.4);
      text-transform: uppercase;
    }

    .btn:active, .btn.active {
      background: #111;
      color: var(--display-text);
      box-shadow: none;
      transform: translateY(1px);
    }

    .btn-power {
      background: #8b1e1e;
      color: #fff;
    }
    .btn-power.on {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 8px #00ff66;
    }

    /* Reproductor de audio real oculto */
    audio {
      display: none;
    }
  </style>
</head>
<body>

  <div class="cassette-deck">
    <!-- Fila Superior -->
    <div class="deck-top">
      <!-- Casete Físico -->
      <div class="cassette-pocket">
        <div class="spindle left" id="spindleL"></div>
        <div class="spindle right" id="spindleR"></div>
      </div>
      
      <!-- Display Digital -->
      <div class="deck-display">
        <div class="display-status" id="statusText">POWER OFF</div>
        <div class="display-time" id="counter">00:00</div>
      </div>
    </div>

    <!-- Buscador/Pegador de Playlist (Guarda internamente) -->
    <div class="playlist-input-area">
      <input type="text" id="playlistUrl" placeholder="Pega el link de tu audio (.mp3)...">
      <button onclick="loadPlaylist()">Cargar</button>
    </div>

    <!-- Botonera de la Grabadora -->
    <div class="deck-controls">
      <button class="btn btn-power" id="powerBtn" onclick="togglePower()">POWER</button>
      <button class="btn" id="playBtn" onclick="playAudio()">PLAY</button>
      <button class="btn" id="pauseBtn" onclick="pauseAudio()">PAUSE</button>
      <button class="btn" id="muteBtn" onclick="toggleMute()">MUTE</button>
    </div>
  </div>

  <!-- Elemento de audio real de HTML5 -->
  <audio id="audioPlayer" loop></audio>

  <script>
    const audio = document.getElementById('audioPlayer');
    const powerBtn = document.getElementById('powerBtn');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const counter = document.getElementById('counter');
    const playlistInput = document.getElementById('playlistUrl');

    let isPowerOn = false;
    let isPlaying = false;

    // 1. Al cargar la página, recupera automáticamente la última playlist utilizada
    window.onload = () => {
      const savedLink = localStorage.getItem('userPlaylist');
      if (savedLink) {
        playlistInput.value = savedLink;
        audio.src = savedLink;
      }
    };

    // Función para guardar el link de forma interna
    function loadPlaylist() {
      const link = playlistInput.value.trim();
      if (link) {
        localStorage.setItem('userPlaylist', link); // Guarda en caché local
        audio.src = link;
        if (isPowerOn) {
          statusText.innerText = "TAPE READY";
        }
      }
    }

    // 2. Encender o Apagar la Grabadora
    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        powerBtn.classList.add('on');
        statusText.innerText = audio.src ? "TAPE READY" : "NO TAPE";
        counter.innerText = "00:00";
      } else {
        powerBtn.classList.remove('on');
        statusText.innerText = "POWER OFF";
        stopAnimations();
        audio.pause();
        isPlaying = false;
        playBtn.classList.remove('active');
        pauseBtn.classList.remove('active');
      }
    }

    // 3. Reproducir, Pausar y Controles
    function playAudio() {
      if (!isPowerOn || !audio.src) return;
      audio.play().then(() => {
        isPlaying = true;
        statusText.innerText = "PLAYING";
        playBtn.classList.add('active');
        pauseBtn.classList.remove('active');
        // El casete empieza a girar físicamente
        spindleL.style.animation = "spin 2s linear infinite";
        spindleR.style.animation = "spin 2s linear infinite";
      }).catch(err => {
        statusText.innerText = "AUDIO ERROR";
      });
    }

    function pauseAudio() {
      if (!isPowerOn || !isPlaying) return;
      audio.pause();
      isPlaying = false;
      statusText.innerText = "PAUSED";
      playBtn.classList.remove('active');
      pauseBtn.classList.add('active');
      stopAnimations();
    }

    function toggleMute() {
      if (!isPowerOn) return;
      audio.muted = !audio.muted;
      if (audio.muted) {
        muteBtn.classList.add('active');
      } else {
        muteBtn.classList.remove('active');
      }
    }

    function stopAnimations() {
      spindleL.style.animation = "none";
      spindleR.style.animation = "none";
    }

    // Actualizador del contador digital en vivo
    audio.ontimeupdate = () => {
      if (!isPowerOn) return;
      const minutes = Math.floor(audio.currentTime / 60).toString().padStart(2, '0');
      const seconds = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
      counter.innerText = `${minutes}:${seconds}`;
    };
  </script>
</body>
</html>
