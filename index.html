<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Stream Cassette</title>
  <style>
    :root {
      --bg-color: #f4f4f5;
      --deck-bg: #2d2d30;
      --deck-border: #1e1e21;
      --text-color: #ffffff;
      --display-bg: #0f1015;
      --display-text: #00ff66;
      --btn-grad-start: #5a5a60;
      --btn-grad-end: #3a3a3d;
      --input-bg: #1e1e21;
      --input-text: #ccc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
        --deck-bg: #1a1a1c;
        --deck-border: #0d0d0e;
        --input-bg: #0f1015;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.3s ease;
    }

    /* Estructura del Deck */
    .cassette-deck {
      background: var(--deck-bg);
      border: 4px solid var(--deck-border);
      border-radius: 12px;
      padding: 20px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
      transition: all 0.3s ease;
    }

    /* Parte Superior */
    .deck-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    /* El compartimento del casete */
    .cassette-pocket {
      width: 180px;
      height: 110px;
      background: #0f0f12;
      border: 3px solid #3e3e42;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Engranajes giratorios */
    .spindle {
      width: 30px;
      height: 30px;
      background: #333;
      border: 5px dotted #666;
      border-radius: 50%;
      position: absolute;
      transition: transform 0.1s linear;
    }
    .spindle.left { left: 45px; }
    .spindle.right { right: 45px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Display Digital */
    .deck-display {
      flex-grow: 1;
      background: var(--display-bg);
      border-radius: 6px;
      border: 2px solid #222;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 90px;
      cursor: pointer;
      position: relative;
    }

    .display-status {
      font-family: monospace;
      color: var(--display-text);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* INPUT SECRETO: Solo aparece cuando pasás el mouse sobre el Display */
    .playlist-input-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--display-bg);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .deck-display:hover .playlist-input-area {
      opacity: 1;
      pointer-events: auto;
    }

    .playlist-input-area input {
      width: 70%;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #39ff14;
      padding: 6px;
      font-size: 10px;
      font-family: monospace;
    }

    .playlist-input-area button {
      background: #333;
      color: #39ff14;
      border: 1px solid #444;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-family: monospace;
    }

    /* REPRODUCTOR SECRETO (Deslizable): Oculto por defecto */
    .player-container {
      width: 100%;
      height: 0px; /* Escondido */
      overflow: hidden;
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
    }

    /* Al pasar el mouse por encima de la casetera entera, el reproductor de Spotify se desliza hacia abajo */
    .cassette-deck:hover .player-container {
      height: 80px; /* Se abre lo suficiente para ver los controles de Spotify */
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Botonera de control físico */
    .deck-controls {
      display: flex;
      justify-content: space-between;
      background: #151517;
      padding: 8px;
      border-radius: 6px;
    }

    .btn {
      background: linear-gradient(180deg, var(--btn-grad-start), var(--btn-grad-end));
      border: 1px solid #111;
      color: #eee;
      padding: 8px 10px;
      font-size: 9px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 2px 3px rgba(0,0,0,0.4);
      text-transform: uppercase;
    }

    .btn:active, .btn.active {
      background: #111;
      color: var(--display-text);
      box-shadow: none;
      transform: translateY(1px);
    }

    .btn-power {
      background: #8b1e1e;
      color: #fff;
    }
    .btn-power.on {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 8px #00ff66;
    }
  </style>
</head>
<body>

  <div class="cassette-deck">
    <!-- Fila Superior -->
    <div class="deck-top">
      <div class="cassette-pocket">
        <div class="spindle left" id="spindleL"></div>
        <div class="spindle right" id="spindleR"></div>
      </div>
      
      <!-- Display con Input Secreto al pasar el mouse encima -->
      <div class="deck-display">
        <div class="display-status" id="statusText">POWER OFF</div>
        <div class="display-status" style="font-size: 9px; color: #555;" id="brandText">PASA EL MOUSE AQUÍ ✎</div>
        
        <!-- El Input de texto ahora vive oculto dentro del propio display digital -->
        <div class="playlist-input-area">
          <input type="text" id="playlistUrl" placeholder="Link de Spotify...">
          <button onclick="loadPlaylist()">OK</button>
        </div>
      </div>
    </div>

    <!-- Reproductor que se desliza como cajón secreto solo al pasar el mouse por la casetera -->
    <div class="player-container" id="playerContainer">
      <iframe id="musicFrame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- Botonera -->
    <div class="deck-controls">
      <button class="btn btn-power" id="powerBtn" onclick="togglePower()">POWER</button>
      <button class="btn" id="playBtn" onclick="spinCassette(true)">GIRAR</button>
      <button class="btn" id="stopBtn" onclick="spinCassette(false)">PARAR</button>
    </div>
  </div>

  <script>
    const powerBtn = document.getElementById('powerBtn');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const playlistInput = document.getElementById('playlistUrl');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;

    window.onload = () => {
      const savedLink = localStorage.getItem('userPlaylistStream');
      if (savedLink) {
        playlistInput.value = savedLink;
        processAndLoadLink(savedLink);
      }
    };

    function processAndLoadLink(rawLink) {
      let embedUrl = "";
      if (rawLink.includes("spotify.com")) {
        embedUrl = rawLink.replace("open.spotify.com/", "open.spotify.com/embed/");
      } else if (rawLink.includes("youtube.com") || rawLink.includes("youtu.be")) {
        let videoId = "";
        if (rawLink.includes("watch?v=")) {
          videoId = rawLink.split("v=")[1].split("&")[0];
        } else if (rawLink.includes("youtu.be/")) {
          videoId = rawLink.split("youtu.be/")[1].split("?")[0];
        }
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      } else if (rawLink.includes("soundcloud.com")) {
        embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(rawLink)}&color=%23ff5500`;
      } else {
        embedUrl = rawLink;
      }
      musicFrame.src = embedUrl;
    }

    function loadPlaylist() {
      const link = playlistInput.value.trim();
      if (link) {
        localStorage.setItem('userPlaylistStream', link);
        processAndLoadLink(link);
        if (isPowerOn) {
          statusText.innerText = "TAPE READY";
        }
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        powerBtn.classList.add('on');
        statusText.innerText = playlistInput.value ? "TAPE READY" : "NO TAPE";
      } else {
        powerBtn.classList.remove('on');
        statusText.innerText = "POWER OFF";
        spinCassette(false);
      }
    }

    function spinCassette(shouldSpin) {
      if (!isPowerOn) return;
      if (shouldSpin) {
        spindleL.style.animation = "spin 2s linear infinite";
        spindleR.style.animation = "spin 2s linear infinite";
        statusText.innerText = "TAPE RUNNING";
        playBtn.classList.add('active');
        stopBtn.classList.remove('active');
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        statusText.innerText = "TAPE STOPPED";
        playBtn.classList.remove('active');
        stopBtn.classList.add('active');
      }
    }
  </script>
</body>
</html>
