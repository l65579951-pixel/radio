<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Casete Retro Profesional</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-bg: #1c1a24;
            --panel-border: #3c354a;
            --text-color: #f3f0f7;
            --accent-color: #ff3c3c;
        }

        [data-theme="light"] {
            --bg-color: #f0edf5;
            --panel-bg: #e2dde8;
            --panel-border: #b8afc4;
            --text-color: #231f2b;
            --accent-color: #d61c1c;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .widget-container {
            width: 100%;
            max-width: 550px;
            background: var(--panel-bg);
            border: 4px solid var(--panel-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* DISEÑO DE LA FACHADA FISICA CON LA IMAGEN */
        .deck-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1.5; /* Ajuste para calzar perfecto con la imagen de la grabadora */
            background-image: url('https://i.postimg.cc/ncXV4Sc5/grabadora-roja-removebg-preview.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* COMPORTAMIENTO DE INSERCIÓN DEL CASETTE (Estilo Anime GIF) */
        .cassette-slot {
            position: absolute;
            top: 25%;
            left: 21%;
            width: 58%;
            height: 48%;
            perspective: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .cassette-image {
            width: 82%;
            height: auto;
            content: url('https://i.postimg.cc/9fWvpztK/casette-rojo-removebg-preview.png');
            opacity: 0;
            transform: translateY(-120px) rotateX(45deg) rotateY(15deg) scale(0.8);
            transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
        }

        /* Clase activada cuando hay música "insertada" */
        .cassette-slot.inserted .cassette-image {
            opacity: 1;
            transform: translateY(0px) rotateX(0deg) rotateY(0deg) scale(1);
        }

        /* Engranajes rotatorios superpuestos digitalmente */
        .reel-overlay {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 4px dashed #111;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 3;
            pointer-events: none;
        }

        .reel-overlay.active {
            opacity: 0.6;
        }

        .reel-left-overlay {
            top: 45%;
            left: 37%;
        }

        .reel-right-overlay {
            top: 45%;
            left: 55%;
        }

        @keyframes spin-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-ccw {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .spin-play { animation: spin-cw 2.5s linear infinite; }
        .spin-ff { animation: spin-cw 0.4s linear infinite; }
        .spin-rew { animation: spin-ccw 0.4s linear infinite; }

        /* BOTONES FISICOS INVISIBLES SOBRE LA GRABADORA */
        .invisible-btn-deck {
            position: absolute;
            bottom: 4%;
            left: 15%;
            width: 70%;
            height: 14%;
            display: flex;
            gap: 2%;
        }

        .inv-btn {
            flex: 1;
            background: rgba(255, 0, 0, 0.0); /* Cambia temporalmente el 0.0 por 0.1 si quieres ver las zonas de toque */
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .inv-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .inv-btn:active {
            background: rgba(0, 0, 0, 0.3);
        }

        /* PANTALLA DIGITAL DE INFORMACIÓN */
        .digital-display {
            position: absolute;
            top: 6%;
            left: 21%;
            width: 58%;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #ff3c3c;
            color: #00ff66;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            box-shadow: inset 0 0 8px rgba(0, 255, 102, 0.3);
        }

        .led-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2b1111;
        }
        .led-indicator.active {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        /* SECCIÓN DE CONFIGURACIÓN */
        .config-section {
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--panel-border);
        }

        .input-group {
            margin-bottom: 12px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: var(--text-color);
        }

        .input-inline {
            display: flex;
            gap: 8px;
        }

        .text-input {
            flex-grow: 1;
            background: #09090b;
            border: 1px solid var(--panel-border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .action-btn {
            background: var(--panel-border);
            border: none;
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .action-btn:hover {
            background: var(--accent-color);
            color: #fff;
        }

        .file-dropzone {
            border: 2px dashed var(--panel-border);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.1);
            font-size: 0.75rem;
        }
        .file-dropzone:hover {
            border-color: var(--accent-color);
        }
        #file-input { display: none; }

        /* CAMUFLAJE DE SPOTIFY */
        .spotify-container {
            margin-top: 10px;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--panel-border);
        }

        .header-widget {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="header-widget">
        <span style="font-size: 0.9rem; font-weight: bold;">RED DECK SYSTEM</span>
        <button class="action-btn" id="theme-btn">🌗 TEMA</button>
    </div>

    <!-- CUBIERTA FÍSICA SUPERPUESTA -->
    <div class="deck-wrapper">
        <!-- Display digital incrustado en el diseño -->
        <div class="digital-display">
            <span id="display-text">NO CASSETTE LOADED</span>
            <div class="led-indicator" id="status-led"></div>
        </div>

        <!-- Ranura con compuerta de casete y animación de empuje en 3D -->
        <div class="cassette-slot" id="cassette-slot">
            <div class="cassette-image"></div>
            <!-- Engranajes virtuales dinámicos -->
            <div class="reel-overlay reel-left-overlay" id="reel-left"></div>
            <div class="reel-overlay reel-right-overlay" id="reel-right"></div>
        </div>

        <!-- Botonera Invisible colocada exactamente sobre las teclas físicas rojas -->
        <div class="invisible-btn-deck">
            <button class="inv-btn" id="btn-rew" title="Retroceso rápido"></button>
            <button class="inv-btn" id="btn-play" title="Reproducir"></button>
            <button class="inv-btn" id="btn-pause" title="Pausar"></button>
            <button class="inv-btn" id="btn-ff" title="Avance rápido"></button>
            <button class="inv-btn" id="btn-eject" title="Expulsar cinta"></button>
        </div>
    </div>

    <!-- PANEL DE CONTROL TRASERO / AJUSTES -->
    <div class="config-section">
        <div class="input-group">
            <label>Sintonizar Bypass Analógico</label>
            <div class="input-inline">
                <button class="action-btn" style="flex:1" id="bypass-btn">📟 ENCENDER RUIDO DE CINTA</button>
                <button class="action-btn" style="flex:1; display:none; background:#ff3c3c; color:white;" id="cancel-bypass-btn">❌ APAGAR BYPASS</button>
            </div>
        </div>

        <div class="input-group">
            <label>1. Playlist de Spotify (Fachada)</label>
            <div class="input-inline">
                <input type="text" class="text-input" id="spotify-link" placeholder="Pega enlace de Spotify..." />
                <button class="action-btn" id="save-playlist-btn">💾 GUARDAR</button>
            </div>
        </div>

        <div class="input-group">
            <label>2. Archivo Local (.MP3) - Sin problemas de CORS</label>
            <div class="file-dropzone" id="dropzone">📁 Arrastra o selecciona música local</div>
            <input type="file" id="file-input" accept="audio/*">
        </div>

        <div class="input-group">
            <label>Volumen General</label>
            <input type="range" class="vol-slider" style="width:100%" id="volume-control" min="0" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <!-- CAMUFLAJE SPOTIFY -->
    <div class="spotify-container" id="spotify-container">
        <iframe id="spotify-iframe" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
    </div>
</div>

<script>
    let audioContext = null;
    let noiseNode = null;
    let localAudio = new Audio();
    let isPlaying = false;
    let currentMode = 'none'; // 'none' | 'analog' | 'local' | 'spotify'
    let spinState = '';

    const cassetteSlot = document.getElementById('cassette-slot');
    const reelLeft = document.getElementById('reel-left');
    const reelRight = document.getElementById('reel-right');
    const displayText = document.getElementById('display-text');
    const statusLed = document.getElementById('status-led');
    
    // Botonera invisible
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnRew = document.getElementById('btn-rew');
    const btnFF = document.getElementById('btn-ff');
    const btnEject = document.getElementById('btn-eject');

    // Paneles traseros
    const bypassBtn = document.getElementById('bypass-btn');
    const cancelBypassBtn = document.getElementById('cancel-bypass-btn');
    const spotifyLink = document.getElementById('spotify-link');
    const spotifyIframe = document.getElementById('spotify-iframe');
    const savePlaylistBtn = document.getElementById('save-playlist-btn');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const volumeControl = document.getElementById('volume-control');
    const themeBtn = document.getElementById('theme-btn');

    // Cargar playlist inicial guardada
    const savedPlaylist = localStorage.getItem('cassette_playlist');
    if (savedPlaylist) {
        spotifyLink.value = savedPlaylist;
        updateSpotifyIframe(savedPlaylist);
    }

    // Guardar playlist
    savePlaylistBtn.addEventListener('click', () => {
        const link = spotifyLink.value;
        if (link) {
            localStorage.setItem('cassette_playlist', link);
            updateSpotifyIframe(link);
            insertCassetteAnimation("SPOTIFY READY");
        }
    });

    // Cambiar tema visual
    themeBtn.addEventListener('click', () => {
        const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', theme);
    });

    function updateSpotifyIframe(url) {
        if (!url) return;
        let embedUrl = url;
        if (url.includes('spotify.com') && !url.includes('/embed')) {
            embedUrl = url.replace('spotify.com/', 'spotify.com/embed/');
        }
        spotifyIframe.src = embedUrl;
        currentMode = 'spotify';
    }

    // Subida de archivos
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--accent-color)'; });
    dropzone.addEventListener('dragleave', () => dropzone.style.borderColor = 'var(--panel-border)');
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.style.borderColor = 'var(--panel-border)';
        if (e.dataTransfer.files.length > 0) loadLocalFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) loadLocalFile(e.target.files[0]);
    });

    function loadLocalFile(file) {
        const objectURL = URL.createObjectURL(file);
        localAudio.src = objectURL;
        currentMode = 'local';
        insertCassetteAnimation(file.name);
        playAudio();
    }

    // Animación de inserción 3D de la casete
    function insertCassetteAnimation(text) {
        cassetteSlot.classList.remove('inserted');
        setTimeout(() => {
            cassetteSlot.classList.add('inserted');
            displayText.textContent = text.toUpperCase();
        }, 150);
    }

    // SINTETIZADOR DE SONIDO ANALÓGICO
    function initAudioContext() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    function startAnalogNoise() {
        initAudioContext();
        if (audioContext.state === 'suspended') audioContext.resume();

        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);

        let b0 = 0.0, b1 = 0.0, b2 = 0.0, b3 = 0.0, b4 = 0.0, b5 = 0.0, b6 = 0.0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179;
            b1 = 0.99332 * b1 + white * 0.0750759;
            b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856;
            b4 = 0.55000 * b4 + white * 0.5329522;
            b5 = -0.7616 * b5 - white * 0.0168980;
            output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
            output[i] *= 0.11;
            b6 = white * 0.115926;
        }

        noiseNode = audioContext.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        noiseNode.loop = true;

        const filterNode = audioContext.createBiquadFilter();
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 1000;
        filterNode.Q.value = 0.5;

        const gainNode = audioContext.createGain();
        gainNode.gain.value = volumeControl.value * 0.1;

        noiseNode.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioContext.destination);

        noiseNode.start(0);
    }

    function stopAnalogNoise() {
        if (noiseNode) {
            try { noiseNode.stop(); } catch(e) {}
            noiseNode = null;
        }
    }

    // CONTROLADORES DE ANIMACIÓN Y AUDIO
    function updateReelOverlayAnimation(state) {
        spinState = state;
        reelLeft.className = 'reel-overlay reel-left-overlay';
        reelRight.className = 'reel-overlay reel-right-overlay';

        if (state) {
            reelLeft.classList.add('active', 'spin-' + state);
            reelRight.classList.add('active', 'spin-' + state);
        }
    }

    function playAudio() {
        if (currentMode === 'none') {
            displayText.textContent = "INSERTE CINTA O SPOTIFY";
            return;
        }
        isPlaying = true;
        statusLed.classList.add('active');

        if (currentMode === 'local') {
            localAudio.play();
            updateReelOverlayAnimation('play');
        } else if (currentMode === 'analog') {
            startAnalogNoise();
            updateReelOverlayAnimation('play');
            displayText.textContent = "SINTETIZADOR ACTIVO";
        } else if (currentMode === 'spotify') {
            updateReelOverlayAnimation('play');
            displayText.textContent = "SPOTIFY REPRODUCIENDO...";
        }
    }

    function pauseAudio() {
        isPlaying = false;
        statusLed.classList.remove('active');
        updateReelOverlayAnimation('');

        if (currentMode === 'local') {
            localAudio.pause();
        } else if (currentMode === 'analog') {
            stopAnalogNoise();
        }
        displayText.textContent = "PAUSADO";
    }

    // ACCIONES DE BOTONERA INVISIBLE
    btnPlay.addEventListener('click', playAudio);
    btnPause.addEventListener('click', pauseAudio);

    btnFF.addEventListener('click', () => {
        if (!isPlaying) return;
        updateReelOverlayAnimation('ff');
        if (currentMode === 'local') localAudio.currentTime += 10;
        displayText.textContent = "AVANZANDO...";
    });

    btnRew.addEventListener('click', () => {
        if (!isPlaying) return;
        updateReelOverlayAnimation('rew');
        if (currentMode === 'local') localAudio.currentTime -= 10;
        displayText.textContent = "REBOBINANDO...";
    });

    btnEject.addEventListener('click', () => {
        pauseAudio();
        cassetteSlot.classList.remove('inserted');
        displayText.textContent = "TAPE EJECTED";
        currentMode = 'none';
        localAudio.src = '';
    });

    // BOTONES DE BYPASS
    bypassBtn.addEventListener('click', () => {
        currentMode = 'analog';
        bypassBtn.style.display = 'none';
        cancelBypassBtn.style.display = 'block';
        insertCassetteAnimation("BYPASS ANALÓGICO");
        playAudio();
    });

    cancelBypassBtn.addEventListener('click', () => {
        stopAnalogNoise();
        bypassBtn.style.display = 'block';
        cancelBypassBtn.style.display = 'none';
        
        if (localAudio.src && localAudio.src !== window.location.href) {
            currentMode = 'local';
            displayText.textContent = "MÚSICA LOCAL";
        } else if (spotifyLink.value) {
            currentMode = 'spotify';
            displayText.textContent = "SPOTIFY READY";
        } else {
            currentMode = 'none';
            cassetteSlot.classList.remove('inserted');
            displayText.textContent = "NO CASSETTE LOADED";
        }
    });

    volumeControl.addEventListener('input', (e) => {
        localAudio.volume = e.target.value;
        if (isPlaying && currentMode === 'analog') {
            stopAnalogNoise();
            startAnalogNoise();
        }
    });
</script>
</body>
</html>
