<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Stream Cassette</title>
  <style>
    /* Variables para Modo Claro y Oscuro automáticos */
    :root {
      --bg-color: #f4f4f5;
      --deck-bg: #2d2d30;
      --deck-border: #1e1e21;
      --text-color: #ffffff;
      --display-bg: #0f1015;
      --display-text: #00ff66;
      --btn-grad-start: #5a5a60;
      --btn-grad-end: #3a3a3d;
      --input-bg: #1e1e21;
      --input-text: #ccc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #191919;
        --deck-bg: #1a1a1c;
        --deck-border: #0d0d0e;
        --input-bg: #0f1015;
      }
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.3s ease;
    }

    /* Estructura del Deck */
    .cassette-deck {
      background: var(--deck-bg);
      border: 4px solid var(--deck-border);
      border-radius: 12px;
      padding: 20px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Parte Superior: Compartimento del casete y Display */
    .deck-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    /* El compartimento del casete */
    .cassette-pocket {
      width: 180px;
      height: 110px;
      background: #0f0f12;
      border: 3px solid #3e3e42;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Los engranajes del casete que giran */
    .spindle {
      width: 30px;
      height: 30px;
      background: #333;
      border: 5px dotted #666;
      border-radius: 50%;
      position: absolute;
      transition: transform 0.1s linear;
    }
    .spindle.left { left: 45px; }
    .spindle.right { right: 45px; }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Display Digital */
    .deck-display {
      flex-grow: 1;
      background: var(--display-bg);
      border-radius: 6px;
      border: 2px solid #222;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 90px;
    }

    .display-status {
      font-family: monospace;
      color: var(--display-text);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Contenedor del Reproductor Oculto/Integrado */
    .player-container {
      width: 100%;
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      display: none; /* Se muestra solo al encender */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Entrada de la Playlist */
    .playlist-input-area {
      display: flex;
      gap: 8px;
    }

    .playlist-input-area input {
      flex-grow: 1;
      background: var(--input-bg);
      border: 1px solid #444;
      border-radius: 4px;
      color: var(--input-text);
      padding: 6px 10px;
      font-size: 11px;
    }

    .playlist-input-area button {
      background: #505055;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    /* Botonera de control físico */
    .deck-controls {
      display: flex;
      justify-content: space-between;
      background: #151517;
      padding: 8px;
      border-radius: 6px;
    }

    .btn {
      background: linear-gradient(180deg, var(--btn-grad-start), var(--btn-grad-end));
      border: 1px solid #111;
      color: #eee;
      padding: 8px 10px;
      font-size: 9px;
      font-weight: bold;
      border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 2px 3px rgba(0,0,0,0.4);
      text-transform: uppercase;
    }

    .btn:active, .btn.active {
      background: #111;
      color: var(--display-text);
      box-shadow: none;
      transform: translateY(1px);
    }

    .btn-power {
      background: #8b1e1e;
      color: #fff;
    }
    .btn-power.on {
      background: #00ff66;
      color: #000;
      box-shadow: 0 0 8px #00ff66;
    }
  </style>
</head>
<body>

  <div class="cassette-deck">
    <!-- Fila Superior (Estética de la casetera) -->
    <div class="deck-top">
      <div class="cassette-pocket">
        <div class="spindle left" id="spindleL"></div>
        <div class="spindle right" id="spindleR"></div>
      </div>
      
      <div class="deck-display">
        <div class="display-status" id="statusText">POWER OFF</div>
        <div class="display-status" style="font-size: 9px; color: #555;" id="brandText">STEREO DECK</div>
      </div>
    </div>

    <!-- El reproductor integrado de la plataforma (aparece al encender) -->
    <div class="player-container" id="playerContainer">
      <iframe id="musicFrame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- Entrada de Playlist (Guarda internamente) -->
    <div class="playlist-input-area">
      <input type="text" id="playlistUrl" placeholder="Pega link de Spotify, SoundCloud o YT...">
      <button onclick="loadPlaylist()">Cargar</button>
    </div>

    <!-- Botonera -->
    <div class="deck-controls">
      <button class="btn btn-power" id="powerBtn" onclick="togglePower()">POWER</button>
      <button class="btn" id="playBtn" onclick="spinCassette(true)">GIRAR</button>
      <button class="btn" id="stopBtn" onclick="spinCassette(false)">PARAR</button>
    </div>
  </div>

  <script>
    const powerBtn = document.getElementById('powerBtn');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const spindleL = document.getElementById('spindleL');
    const spindleR = document.getElementById('spindleR');
    const statusText = document.getElementById('statusText');
    const playlistInput = document.getElementById('playlistUrl');
    const playerContainer = document.getElementById('playerContainer');
    const musicFrame = document.getElementById('musicFrame');

    let isPowerOn = false;

    // Al cargar, recupera la playlist guardada de la memoria interna
    window.onload = () => {
      const savedLink = localStorage.getItem('userPlaylistStream');
      if (savedLink) {
        playlistInput.value = savedLink;
        processAndLoadLink(savedLink);
      }
    };

    // Procesa los links de Spotify, YT o SoundCloud para que no se bloqueen
    function processAndLoadLink(rawLink) {
      let embedUrl = "";

      if (rawLink.includes("spotify.com")) {
        // Convierte link normal de Spotify a link de reproductor incrustado
        embedUrl = rawLink.replace("open.spotify.com/", "open.spotify.com/embed/");
      } else if (rawLink.includes("youtube.com") || rawLink.includes("youtu.be")) {
        let videoId = "";
        if (rawLink.includes("watch?v=")) {
          videoId = rawLink.split("v=")[1].split("&")[0];
        } else if (rawLink.includes("youtu.be/")) {
          videoId = rawLink.split("youtu.be/")[1].split("?")[0];
        }
        embedUrl = `https://www.youtube.com/embed/${videoId}`;
      } else if (rawLink.includes("soundcloud.com")) {
        embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(rawLink)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true`;
      } else {
        embedUrl = rawLink; // Si ya es un embed directo
      }

      musicFrame.src = embedUrl;
    }

    function loadPlaylist() {
      const link = playlistInput.value.trim();
      if (link) {
        localStorage.setItem('userPlaylistStream', link); // Se guarda internamente
        processAndLoadLink(link);
        if (isPowerOn) {
          statusText.innerText = "PLAYLIST READY";
        }
      }
    }

    function togglePower() {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        powerBtn.classList.add('on');
        statusText.innerText = playlistInput.value ? "PLAYLIST READY" : "NO PLAYLIST";
        playerContainer.style.display = 'block'; // Muestra el reproductor nativo
      } else {
        powerBtn.classList.remove('on');
        statusText.innerText = "POWER OFF";
        playerContainer.style.display = 'none'; // Apaga todo
        spinCassette(false);
      }
    }

    // Control visual del casete
    function spinCassette(shouldSpin) {
      if (!isPowerOn) return;
      if (shouldSpin) {
        spindleL.style.animation = "spin 2s linear infinite";
        spindleR.style.animation = "spin 2s linear infinite";
        statusText.innerText = "TAPE RUNNING";
        playBtn.classList.add('active');
        stopBtn.classList.remove('active');
      } else {
        spindleL.style.animation = "none";
        spindleR.style.animation = "none";
        statusText.innerText = "TAPE STOPPED";
        playBtn.classList.remove('active');
        stopBtn.classList.add('active');
      }
    }
  </script>
</body>
</html>
